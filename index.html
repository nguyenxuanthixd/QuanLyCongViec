<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Tiến Độ & Hiệu Suất KPI Gói Thầu</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;850&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f5f3ff',
              100: '#ede9fe',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
              900: '#312e81',
              950: '#030014',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Space Grotesk', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>

  <style>
    body { font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    .dark ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .animate-fade-in { animation: fadeIn 0.25s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 min-h-screen transition-colors duration-250 pb-12">

  <!-- Header -->
  <header class="sticky top-0 z-40 bg-white/95 dark:bg-slate-900/95 border-b border-gray-100 dark:border-slate-800 backdrop-blur-sm transition-all duration-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="p-2 bg-indigo-600 rounded-xl text-white">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
        </div>
        <div>
          <h1 class="text-base sm:text-lg font-bold font-display text-gray-900 dark:text-white tracking-tight leading-tight">KPI Đấu Thầu</h1>
          <p class="text-[10.5px] font-bold text-gray-400 dark:text-slate-500 uppercase tracking-wider">Hệ Thống Theo Dõi Hiệu Suất Gói Thầu</p>
        </div>
      </div>

      <!-- Controls -->
      <div class="flex items-center gap-2 sm:gap-3">
        <!-- Theme Toggle -->
        <button id="theme-toggle-btn" class="p-2 rounded-xl text-gray-500 dark:text-slate-400 hover:bg-gray-100 dark:hover:bg-slate-800 transition duration-150 cursor-pointer" title="Đổi giao diện Sáng / Tối">
          <svg id="theme-sun-icon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="5" /><path stroke-linecap="round" stroke-linejoin="round" d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
          </svg>
          <svg id="theme-moon-icon" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
          </svg>
        </button>

        <!-- CSV Export -->
        <button id="global-export-btn" class="flex items-center gap-1.5 px-3.5 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-xs font-bold shadow-sm transition duration-150 cursor-pointer">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
          <span class="hidden sm:inline">Xuất Excel</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Navigation tabs -->
  <div class="bg-white dark:bg-slate-900 border-b border-gray-100 dark:border-slate-800 transition-all duration-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex gap-1 overflow-x-auto">
      <button id="tab-dashboard" class="px-5 py-3.5 text-xs font-bold tracking-wider uppercase border-b-2 border-indigo-600 text-indigo-600 dark:text-indigo-400 transition cursor-pointer flex items-center gap-1.5 shrink-0">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
        Đo Lường & KPI
      </button>
      <button id="tab-tasks" class="px-5 py-3.5 text-xs font-bold tracking-wider uppercase border-b-2 border-transparent text-gray-500 dark:text-slate-400 hover:text-gray-900 dark:hover:text-white transition cursor-pointer flex items-center gap-1.5 shrink-0">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" /></svg>
        Nhật Ký Công Việc
      </button>
      <button id="tab-projects" class="px-5 py-3.5 text-xs font-bold tracking-wider uppercase border-b-2 border-transparent text-gray-500 dark:text-slate-400 hover:text-gray-900 dark:hover:text-white transition cursor-pointer flex items-center gap-1.5 shrink-0">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" /></svg>
        Danh Sách Gói Thầu
      </button>
    </div>
  </div>

  <!-- Main Container -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-6">
    <!-- Active Overdue Alerts Banner (Crucial Alert Center) -->
    <div id="alert-banner-container" class="hidden mb-6 animate-fade-in">
      <div class="bg-amber-50 dark:bg-amber-950/20 border border-amber-200 dark:border-amber-900/40 rounded-2xl p-4 flex items-start gap-3 shadow-xs">
        <div class="p-2 bg-amber-150 dark:bg-amber-900/40 text-amber-600 dark:text-amber-400 rounded-xl shrink-0">
          <svg class="w-5 h-5 animate-bounce" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
          </svg>
        </div>
        <div class="flex-1">
          <h3 id="alert-banner-title" class="text-sm font-bold text-amber-850 dark:text-amber-300">CẢNH BÁO TIẾN ĐỘ: Đang có công việc trễ hạn!</h3>
          <p id="alert-banner-desc" class="text-xs text-amber-600 dark:text-amber-400/80 mt-0.5">Một số hồ sơ kỹ thuật hoặc pháp lý đã quá thời hạn tự lập kế hoạch nhưng chưa hoàn tất đánh giá.</p>
        </div>
      </div>
    </div>

    <!-- TAB 1: DASHBOARD & MEASUREMENTS -->
    <section id="view-dashboard" class="space-y-6">
      <!-- Generated dynamically by renderDashboard() in JS -->
    </section>

    <!-- TAB 2: DETAILED TASKS LOG -->
    <section id="view-tasks" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-6">
      
      <!-- Task Form column (1/3) -->
      <div class="lg:col-span-1 space-y-4">
        <div class="bg-white dark:bg-slate-900 rounded-2xl border border-gray-100 dark:border-slate-800 p-5 shadow-xs">
          <div class="border-b border-gray-100 dark:border-slate-850 pb-3 mb-4 flex items-center gap-2">
            <svg class="w-4 h-4 text-indigo-600 dark:text-indigo-400" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            <h3 id="form-task-title" class="font-bold text-sm text-gray-900 dark:text-white uppercase tracking-wider">Thêm Nhiệm Vụ Mới</h3>
          </div>

          <form id="task-form" class="space-y-4">
            <input type="hidden" id="edit-task-id" value="">
            
            <div>
              <label class="block text-[10.5px] font-bold text-gray-400 dark:text-slate-500 uppercase tracking-wider mb-1">Dự Án / Gói Thầu <span class="text-rose-500">*</span></label>
              <select id="task-form-project-id" class="w-full rounded-xl border border-gray-200 dark:border-slate-800 px-3 py-2 text-xs bg-slate-50 dark:bg-slate-950 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all text-slate-850 dark:text-slate-100 font-medium" required>
                <!-- Injected by JS -->
              </select>
            </div>

            <div>
              <label class="block text-[10.5px] font-bold text-gray-400 dark:text-slate-500 uppercase tracking-wider mb-1">Nội dung công việc <span class="text-rose-500">*</span></label>
              <textarea id="task-form-content" rows="3" placeholder="Ví dụ: Lập thuyết minh biện pháp thi công kết cấu phần ngầm, làm rõ bảng dự toán chi phí thầu..." class="w-full rounded-xl border border-gray-200 dark:border-slate-800 px-3 py-2 text-xs bg-slate-50 dark:bg-slate-950 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all text-slate-850 dark:text-slate-100" required></textarea>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <div>
                <label class="block text-[10.5px] font-bold text-gray-400 dark:text-slate-500 uppercase tracking-wider mb-1">Ngày bắt đầu <span class="text-rose-500">*</span></label>
                <input type="datetime-local" id="task-form-start-time" class="w-full rounded-xl border border-gray-200 dark:border-slate-800 px-2.5 py-1.5 text-xs bg-slate-50 dark:bg-slate-950 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 text-slate-800 dark:text-slate-100" required>
              </div>
              <div>
                <label class="block text-[10.5px] font-bold text-gray-400 dark:text-slate-500 uppercase tracking-wider mb-1">Hạn kế hoạch <span class="text-rose-500">*</span></label>
                <input type="datetime-local" id="task-form-plan-end" class="w-full rounded-xl border border-gray-200 dark:border-slate-800 px-2.5 py-1.5 text-xs bg-slate-50 dark:bg-slate-950 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 text-slate-800 dark:text-slate-100" required>
              </div>
            </div>

            <div id="task-form-error" class="hidden text-[11px] text-rose-600 bg-rose-50 dark:bg-rose-950/20 dark:text-rose-450 p-2.5 rounded-xl border border-rose-100 dark:border-rose-950/30"></div>

            <div class="flex gap-2 pt-2">
              <button type="button" id="task-form-cancel-btn" class="hidden flex-1 px-3 py-2 border border-gray-200 dark:border-slate-800 text-gray-500 dark:text-slate-400 rounded-xl text-xs font-semibold hover:bg-gray-50 dark:hover:bg-slate-800 cursor-pointer">
                Hủy Sửa
              </button>
              <button type="submit" id="task-form-submit-btn" class="flex-1 px-4 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-xs font-bold shadow-sm transition cursor-pointer">
                Lưu Công Việc
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- Task Lists & Filters column (2/3) -->
      <div class="lg:col-span-2 space-y-4">
        <!-- Controls & Filters Bar -->
        <div class="bg-white dark:bg-slate-900 rounded-2xl border border-gray-100 dark:border-slate-800 p-4 shadow-xs flex flex-col md:flex-row gap-3 items-center justify-between">
          <!-- Search input -->
          <div class="relative w-full md:w-64">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" /><path d="M21 21l-4.35-4.35" /></svg>
            </span>
            <input type="text" id="task-search" placeholder="Tìm nội dung công việc..." class="w-full pl-9 pr-4 py-2 rounded-xl border border-gray-200 dark:border-slate-800 text-xs bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500/20">
          </div>

          <!-- Project selector -->
          <div class="w-full md:w-52">
            <select id="task-filter-project" class="w-full rounded-xl border border-gray-200 dark:border-slate-800 px-3 py-2 text-xs bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100">
              <option value="all">Tất cả gói thầu</option>
              <!-- Injected by JS -->
            </select>
          </div>

          <!-- Quick Filters Status tabs -->
          <div class="flex border border-gray-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 p-1 rounded-xl w-full md:w-auto overflow-x-auto">
            <button data-filter="all" class="task-filter-tab flex-1 md:flex-initial px-3 py-1.5 text-[11px] font-bold rounded-lg text-indigo-600 bg-white dark:bg-slate-900 shadow-xs cursor-pointer">Tất cả</button>
            <button data-filter="pending" class="task-filter-tab flex-1 md:flex-initial px-3 py-1.5 text-[11px] font-bold rounded-lg text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white cursor-pointer">Chưa xong</button>
            <button data-filter="completed" class="task-filter-tab flex-1 md:flex-initial px-3 py-1.5 text-[11px] font-bold rounded-lg text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white cursor-pointer">Nghiệm thu</button>
            <button data-filter="overdue" class="task-filter-tab flex-1 md:flex-initial px-3 py-1.5 text-[11px] font-bold rounded-lg text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white cursor-pointer">Trễ hạn</button>
          </div>
        </div>

        <!-- Dynamic Tasks Log List -->
        <div id="tasks-log-list" class="space-y-3">
          <!-- Injected by JS -->
        </div>
      </div>
    </section>

    <!-- TAB 3: PROJECTS LIST -->
    <section id="view-projects" class="hidden space-y-6">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- New Project Form Column (1/3) -->
        <div class="lg:col-span-1">
          <div class="bg-white dark:bg-slate-900 rounded-2xl border border-gray-100 dark:border-slate-800 p-5 shadow-xs">
            <div class="border-b border-gray-100 dark:border-slate-850 pb-3 mb-4 flex items-center gap-2">
              <svg class="w-4 h-4 text-indigo-600 dark:text-indigo-400" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
              <h3 id="form-project-title" class="font-bold text-sm text-gray-900 dark:text-white uppercase tracking-wider">Tạo Gói Thầu Mới</h3>
            </div>

            <form id="project-form" class="space-y-4">
              <input type="hidden" id="edit-project-id" value="">
              <div>
                <label class="block text-[10.5px] font-bold text-gray-400 dark:text-slate-500 uppercase tracking-wider mb-1">Tên gói thầu / dự án <span class="text-rose-500">*</span></label>
                <textarea id="project-form-name" rows="3" placeholder="Ví dụ: Gói thầu XL-01: Thiết kế thi công xây lắp và cung cấp thiết bị Khối phòng khám..." class="w-full rounded-xl border border-gray-200 dark:border-slate-800 px-3 py-2 text-xs bg-slate-50 dark:bg-slate-950 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all text-slate-850 dark:text-slate-100" required></textarea>
              </div>

              <div id="project-form-error" class="hidden text-[11px] text-rose-600 bg-rose-50 dark:bg-rose-950/20 p-2 rounded-xl"></div>

              <div class="flex gap-2">
                <button type="button" id="project-form-cancel-btn" class="hidden flex-1 px-3 py-2 border border-gray-200 dark:border-slate-800 text-gray-500 dark:text-slate-400 rounded-xl text-xs font-semibold hover:bg-gray-50 dark:hover:bg-slate-800 cursor-pointer">
                  Hủy Sửa
                </button>
                <button type="submit" id="project-form-submit-btn" class="flex-1 px-4 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-xs font-bold shadow-sm cursor-pointer">
                  Lưu Gói Thầu
                </button>
              </div>
            </form>
          </div>
        </div>

        <!-- Projects list with metrics (2/3) -->
        <div class="lg:col-span-2">
          <div id="projects-grid-container" class="space-y-4">
            <!-- Injected by JS -->
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- POPUP EVALUATION MODAL (KPI / Audit completion) -->
  <div id="evaluation-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/70 backdrop-blur-xs">
    <div class="w-full max-w-lg bg-white dark:bg-slate-900 rounded-2xl shadow-2xl border border-gray-150 dark:border-slate-800 overflow-hidden transform transition-all animate-fade-in">
      <div class="flex items-center justify-between px-6 py-4 bg-slate-50 dark:bg-slate-950/45 border-b border-gray-100 dark:border-slate-850">
        <div class="flex items-center gap-2">
          <svg class="w-5 h-5 text-indigo-600 dark:text-indigo-450" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
          <h3 class="text-sm font-bold text-gray-900 dark:text-white uppercase tracking-wider">Đánh Giá & Nghiệm Thu KPI</h3>
        </div>
        <button id="close-eval-modal-btn" type="button" class="text-gray-400 hover:text-gray-650 dark:hover:text-white p-1 rounded-full hover:bg-gray-100 dark:hover:bg-slate-800 transition duration-150 cursor-pointer">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
      </div>

      <div class="p-6 space-y-4">
        <div>
          <span class="text-[10px] font-bold text-gray-400 dark:text-slate-500 uppercase tracking-wider block mb-1">Nhiệm vụ nghiệm thu:</span>
          <p id="eval-task-content" class="text-xs font-medium text-slate-700 dark:text-slate-300 bg-indigo-50/50 dark:bg-indigo-950/30 p-3 rounded-xl border border-indigo-100/30 dark:border-indigo-950/40 italic">"..."</p>
        </div>

        <div>
          <label class="block text-[10.5px] font-bold text-gray-400 dark:text-slate-500 uppercase tracking-wider mb-2">Đánh Giá Chất Lượng Hồ Sơ <span class="text-rose-500">*</span></label>
          <div class="grid grid-cols-2 gap-3">
            <button id="eval-opt-pass" type="button" class="flex items-center justify-center gap-2 py-2.5 px-4 rounded-xl border border-emerald-500 bg-emerald-50 dark:bg-emerald-950/30 text-emerald-800 dark:text-emerald-400 ring-4 ring-emerald-500/10 font-bold text-xs transition">
              <svg class="w-4 h-4 text-emerald-600" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
              ĐẠT YÊU CẦU
            </button>
            <button id="eval-opt-fail" type="button" class="flex items-center justify-center gap-2 py-2.5 px-4 rounded-xl border border-gray-200 dark:border-slate-800 bg-white dark:bg-slate-950 text-gray-500 dark:text-slate-400 font-bold text-xs transition">
              <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4" /></svg>
              CHƯA ĐẠT
            </button>
          </div>
        </div>

        <div>
          <label class="block text-[10.5px] font-bold text-gray-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">Nhận xét chất lượng / Bài học & Sửa đổi <span class="text-rose-500">*</span></label>

    // Initialize State
    function initApp() {
      const storedProj = safeStorage.getItem(STORAGE_KEY_PROJECTS);
      const storedTasks = safeStorage.getItem(STORAGE_KEY_TASKS);
      
      if (storedProj && storedTasks) {
        state.projects = JSON.parse(storedProj);
        state.tasks = JSON.parse(storedTasks);

        state.projects = getMockProjects();
        state.tasks = getMockTasks();
        saveState();

      const storedTheme = safeStorage.getItem(STORAGE_KEY_THEME) || 'light';
      setTheme(storedTheme);

      setupEventListeners();

      // Render App Views
      renderApp();

      setInterval(() => {

        }
        checkOverdueAlerts();
      }, 30000);

    function saveState() {
      safeStorage.setItem(STORAGE_KEY_PROJECTS, JSON.stringify(state.projects));
      safeStorage.setItem(STORAGE_KEY_TASKS, JSON.stringify(state.tasks));

    function setTheme(theme) {
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
        document.getElementById('theme-sun-icon').classList.remove('hidden');
        document.getElementById('theme-moon-icon').classList.add('hidden');
      } else {
        document.documentElement.classList.remove('dark');
        document.getElementById('theme-sun-icon').classList.add('hidden');
        document.getElementById('theme-moon-icon').classList.remove('hidden');
      }
      safeStorage.setItem(STORAGE_KEY_THEME, theme);
    }

    // ---------------------------------------------------------
    // 2. HELPER FUNCTIONS & FORMATTERS
    // ---------------------------------------------------------
    function formatDateTimeLocal(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');
      return `${year}-${month}-${day}T${hours}:${minutes}`;
    }

    function formatReadableDateTime(isoString) {
      if (!isoString) return '';
      const date = new Date(isoString);
      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const year = date.getFullYear();
      return `${hours}:${minutes} ngày ${day}/${month}/${year}`;
    }

    function getRemainingTimeText(planEndTimeStr) {
      const diff = new Date(planEndTimeStr).getTime() - Date.now();
      if (diff <= 0) {
        return { text: 'TRỄ HẸN', isOverdue: true };
      }
      const minutesTotal = Math.floor(diff / (60 * 1000));
      const hoursTotal = Math.floor(diff / (60 * 60 * 1000));
      const days = Math.floor(diff / (24 * 60 * 60 * 1000));

      if (days > 0) {
        const remainingHours = hoursTotal % 24;
        return { text: `Còn ${days} ngày ${remainingHours} giờ`, isOverdue: false };
      }
      if (hoursTotal > 0) {
        const remainingMinutes = minutesTotal % 60;
        return { text: `Còn ${hoursTotal} giờ ${remainingMinutes} phút`, isOverdue: false };
      }
      return { text: `Còn ${minutesTotal > 0 ? minutesTotal : 1} phút`, isOverdue: false };
    }

    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `animate-fade-in flex items-center gap-2 px-4 py-3 rounded-xl shadow-lg text-xs font-bold text-white transition-all duration-300 transform translate-y-0 ${
        type === 'success' ? 'bg-indigo-600' : type === 'error' ? 'bg-rose-600' : 'bg-amber-500'
      }`;
      
      let icon = '';
      if (type === 'success') {
        icon = `<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>`;
      } else {
        icon = `<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>`;
      }

      toast.innerHTML = `${icon} <span>${message}</span>`;
      container.appendChild(toast);

      setTimeout(() => {
        toast.classList.add('opacity-0', 'scale-95');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    function switchTab(tabName) {

        tasks: 'view-tasks',
        projects: 'view-projects'

        dashboard: 'tab-dashboard',
        tasks: 'tab-tasks',
        projects: 'tab-projects'
      };

        const viewEl = document.getElementById(viewIds[key]);
        const tabEl = document.getElementById(tabIds[key]);

          viewEl.classList.remove('hidden');

      const overdueTasks = state.tasks.filter(

      const completedOnTime = completedTasks.filter(t => {
        const completedTime = new Date(t.completedAt).getTime();
        const planEndTime = new Date(t.planEndTime).getTime();
        return completedTime <= planEndTime;
      });
      const completedOnTimeCount = completedOnTime.length;

      const kpiRate = completedTasksCount > 0 
        ? Math.round((completedOnTimeCount / completedTasksCount) * 100) 
        : 0;

      // Thống kê theo từng Dự án
      const projectStats = state.projects.map(proj => {
        const projTasks = state.tasks.filter(t => t.projectId === proj.id);

        // Tỷ lệ Đạt% = Số việc "Đạt" / Tổng số việc đã xong của dự án
        const passedTasks = projTasks.filter(t => t.isCompleted && t.evaluation === 'Dat');

          ? Math.round((passedTasks.length / completedCount) * 100) 
          : 0;

        // Danh sách các "Nhận xét / Bài học cần khắc phục" của dự án
        const remarksList = projTasks

            taskId: t.id,
            content: t.content,
            evaluation: t.evaluation,
            remarks: t.remarks || '',
            completedAt: t.completedAt || '',
          }));

        return {
          ...proj,
          activeCount,
          completedCount,
          passRate,
          remarksList,
          allTasks: projTasks,
        };

        >

            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4.672 12.001A11.959 11.959 0 0112 17c-1.61 0-3.13-.319-4.522-.899m11.196-1.12c.112-.628.18-1.273.18-1.929V8a2 2 0 00-2-2H5a2 2 0 00-2 2v5.051c0 .656.068 1.301.18 1.929m15.196 0a24.04 24.04 0 01-15.196 0" /></svg>
          </div>
          <div>
            <p class="text-xs font-semibold text-gray-400 dark:text-slate-500 uppercase tracking-wider">Công việc đã tạo</p>
            <h4 class="text-2xl font-bold text-gray-800 dark:text-white mt-1">${totalTasksCreated}</h4>
            <p class="text-xs text-gray-500 dark:text-slate-400 mt-0.5">
              Đang thực hiện: <span class="font-semibold text-sky-600 dark:text-sky-450">${totalTasksCreated - completedTasksCount}</span>
            </p>
          </div>
        </div>

        <!-- Card 3: Đã hoàn thành -->
        <div class="bg-white dark:bg-slate-900 rounded-2xl border border-gray-100 dark:border-slate-800 p-5 shadow-xs flex items-center gap-4 transition-colors duration-200">
          <div class="p-3.5 bg-emerald-50 dark:bg-emerald-950/40 text-emerald-600 dark:text-emerald-400 rounded-xl">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
          </div>
          <div>
            <p class="text-xs font-semibold text-gray-400 dark:text-slate-500 uppercase tracking-wider">Công việc đã xong</p>
            <h4 class="text-2xl font-bold text-gray-800 dark:text-white mt-1">${completedTasksCount}</h4>
            <p class="text-xs text-gray-500 dark:text-slate-400 mt-0.5">
              Đúng hạn: <span class="font-semibold text-emerald-600 dark:text-emerald-400">${completedOnTimeCount}</span> / ${completedTasksCount}
            </p>
          </div>
        </div>

        <!-- Card 4: Trễ hạn -->
        <div class="bg-white dark:bg-slate-900 rounded-2xl border border-gray-100 dark:border-slate-800 p-5 shadow-xs flex items-center gap-4 transition-colors duration-200 ${
          overdueTasksCount > 0 ? 'border-rose-300 bg-rose-50/50 dark:bg-rose-950/20' : ''
        }">
          <div class="p-3.5 bg-rose-50 dark:bg-rose-950/40 text-rose-600 dark:text-rose-400 rounded-xl">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4" /></svg>
          </div>
          <div>
            <p class="text-xs font-semibold text-gray-400 dark:text-slate-500 uppercase tracking-wider">Đang bị Trễ hạn</p>
            <h4 class="text-2xl font-bold mt-1 ${overdueTasksCount > 0 ? 'text-rose-600 animate-pulse' : 'text-gray-800 dark:text-white'}">
              ${overdueTasksCount}
            </h4>
            <p class="text-xs text-gray-500 dark:text-slate-400 mt-0.5">
              Yêu cầu xử lý gấp
            </p>
          </div>
        </div>
      </div>

      <!-- 2. Tỷ lệ hoàn thành đúng hạn (KPI) & Biểu đồ trực quan -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <!-- Khối KPI -->
        <div class="bg-gradient-to-br from-indigo-900 to-slate-900 rounded-2xl p-6 text-white shadow-md md:col-span-1 flex flex-col justify-between relative overflow-hidden">
          <!-- Decorative pattern -->
          <div class="absolute right-0 bottom-0 opacity-10 pointer-events-none">
            <svg class="w-48 h-48" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-9 9-4-4-6 6" /></svg>
          </div>

          <div>
            <div class="flex items-center justify-between mb-4">
              <span class="text-xs font-bold text-indigo-300 uppercase tracking-wider bg-indigo-800/50 px-2.5 py-1 rounded-md">
                Chỉ số hiệu suất KPI
              </span>
              <svg class="w-5 h-5 text-indigo-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
            </div>
            <h3 class="text-lg font-semibold text-indigo-100">Tỷ Lệ Hoàn Thành Đúng Hạn</h3>
            <p class="text-xs text-indigo-300 mt-1">Đo lường năng lực quản trị thời gian</p>
          </div>

          <div class="my-6 flex items-center justify-center gap-6">
            <!-- SVG Circular Progress -->
            <div class="relative w-28 h-28">
              <svg class="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                <circle
                  cx="18" cy="18" r="15.9155"
                  class="text-white/10"
                  stroke-width="3.5"
                  stroke="currentColor"
                  fill="none"
                />
                <circle
                  cx="18" cy="18" r="15.9155"
                  class="text-indigo-400 transition-all duration-1000 ease-out"
                  stroke-dasharray="${kpiRate}, 100"
                  stroke-width="3.5"
                  stroke-linecap="round"
                  stroke="currentColor"
                  fill="none"
                />
              </svg>
              <div class="absolute inset-0 flex flex-col items-center justify-center">
                <span class="text-2xl font-extrabold text-white leading-none">${kpiRate}%</span>
                <span class="text-[10px] text-indigo-200 mt-1">ĐÚNG HẠN</span>
              </div>
            </div>

            <div class="text-sm space-y-1">
              <div class="flex items-center gap-1.5 text-xs text-indigo-200">
                <div class="w-2.5 h-2.5 bg-indigo-400 rounded-full"></div>
                <span>Đúng hạn: <strong>${completedOnTimeCount}</strong> việc</span>
              </div>
              <div class="flex items-center gap-1.5 text-xs text-indigo-200">
                <div class="w-2.5 h-2.5 bg-white/20 rounded-full"></div>
                <span>Tổng đã xong: <strong>${completedTasksCount}</strong> việc</span>
              </div>
            </div>
          </div>

          <div class="border-t border-indigo-800/60 pt-3">
            <p class="text-xs text-indigo-200">
              ${
                kpiRate >= 80 
                  ? 'Excellent! Kỹ năng quản lý tiến độ tuyệt vời.' 
                  : kpiRate >= 50 
                  ? 'Good! Bạn đang giữ nhịp khá tốt, hãy cải thiện thêm.' 
                  : completedTasksCount === 0 
                  ? 'Chưa có công việc nào hoàn thành để tính KPI.' 
                  : 'Cảnh báo! Bạn đang bị trễ hạn nhiều, hãy tối ưu hóa kế hoạch.'
              }
            </p>
          </div>
        </div>

        <!-- Khối Tóm tắt Hiệu suất Dự án -->
        <div class="bg-white dark:bg-slate-900 rounded-2xl border border-gray-100 dark:border-slate-800 p-6 shadow-sm md:col-span-2 transition-colors duration-200">
          <div class="flex items-center justify-between mb-4 border-b border-gray-50 dark:border-slate-800 pb-3">
            <div class="flex items-center gap-2">
              <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>
              <h3 class="font-semibold text-gray-800 dark:text-white">Hiệu Suất Theo Dự Án</h3>
            </div>
            <span class="text-xs text-gray-400 dark:text-slate-500 font-medium">Tỷ lệ Đạt yêu cầu</span>
          </div>

          <div class="space-y-4 max-h-[500px] overflow-y-auto pr-1">
            ${
              projectStats.length === 0 
                ? '<p class="text-sm text-gray-400 dark:text-slate-500 text-center py-6">Chưa có dự án nào được khởi tạo.</p>'
                : projectStats.map(p => {
                    const totalProjTasks = p.activeCount + p.completedCount;
                    
                    const tasksHTML = p.allTasks.length === 0 
                      ? `<p class="text-center text-xs text-gray-400 dark:text-slate-500 py-4 italic bg-white dark:bg-slate-950 rounded-lg border border-dashed border-gray-100 dark:border-slate-800">Chưa có công việc nào trong dự án này.</p>`
                      : p.allTasks.map(t => {
                          const isOverdue = !t.isCompleted && new Date(t.planEndTime).getTime() < nowMs;
                          
                          let badgeHTML = '';
                          if (t.isCompleted) {
                            if (t.evaluation === 'Dat') {
                              badgeHTML = `<span class="inline-flex items-center text-[10px] font-bold text-emerald-700 dark:text-emerald-400 bg-emerald-100 dark:bg-emerald-950/50 px-2 py-0.5 rounded-md border border-emerald-200/50 dark:border-emerald-900/30">Đạt</span>`;
                            } else {
                              badgeHTML = `<span class="inline-flex items-center text-[10px] font-bold text-rose-700 dark:text-rose-400 bg-rose-100 dark:bg-rose-950/50 px-2 py-0.5 rounded-md border border-rose-200/50 dark:border-rose-900/30">Không đạt</span>`;
                            }
                          } else if (isOverdue) {
                            badgeHTML = `<span class="inline-flex items-center text-[10px] font-bold text-white bg-rose-500 px-2 py-0.5 rounded-md animate-pulse">Trễ hẹn</span>`;
                          } else {
                            badgeHTML = `<span class="inline-flex items-center text-[10px] font-bold text-indigo-700 dark:text-indigo-400 bg-indigo-50 dark:bg-indigo-950/40 px-2 py-0.5 rounded-md border border-indigo-100/30 dark:border-indigo-900/30">Đang chạy</span>`;
                          }

                          return `
                            <div class="flex items-start justify-between gap-3 text-xs p-2.5 rounded-lg border transition duration-150 ${
                              t.isCompleted 
                                ? t.evaluation === 'Dat'
                                  ? 'bg-emerald-50/10 dark:bg-emerald-950/10 border-emerald-100/40 dark:border-emerald-900/20 text-gray-700 dark:text-slate-300'
                                  : 'bg-rose-50/10 dark:bg-rose-950/10 border-rose-100/40 dark:border-rose-900/20 text-gray-700 dark:text-slate-300'
                                : isOverdue
                                  ? 'bg-rose-50/10 dark:bg-rose-950/20 border-rose-200/30 dark:border-rose-900/30 text-gray-850 dark:text-slate-200'
                                  : 'bg-white dark:bg-slate-900 border-gray-100 dark:border-slate-800 text-gray-700 dark:text-slate-200'
                            }">
                              <div class="space-y-1 min-w-0">
                                <p class="font-semibold leading-relaxed ${t.isCompleted ? 'line-through text-gray-400 dark:text-slate-500' : 'text-gray-750 dark:text-slate-200'}">
                                  ${t.content}
                                </p>
                                <p class="text-[10px] text-gray-400 dark:text-slate-500 font-mono">
                                  ${t.isCompleted 
                                    ? `Đã xong: ${formatReadableDateTime(t.completedAt)}`
                                    : `Hạn: ${formatReadableDateTime(t.planEndTime)}`
                                  }
                                </p>
                              </div>
                              <div class="shrink-0 pt-0.5">
                                ${badgeHTML}
                              </div>
                            </div>
                          `;
                        }).join('');

                    return `
                    <div class="bg-gray-50/20 dark:bg-slate-950/40 rounded-xl p-4 border border-gray-100/70 dark:border-slate-800 space-y-3">
                      <div class="flex items-center justify-between text-sm">
                        <span class="font-bold text-gray-800 dark:text-slate-200 truncate max-w-[240px] sm:max-w-md" title="${p.name}">
                          ${p.name}
                        </span>
                        <span class="text-xs font-bold text-indigo-600 dark:text-indigo-400 bg-indigo-50 dark:bg-indigo-950/50 px-2.5 py-0.5 rounded-md border border-indigo-100/50 dark:border-indigo-900/30">
                          Tỷ lệ Đạt: ${p.passRate}%
                        </span>
                      </div>
                      
                      <!-- Progress Bar -->
                      <div class="h-2 w-full bg-gray-100 dark:bg-slate-800 rounded-full overflow-hidden">
                        <div 
                          class="h-full rounded-full transition-all duration-500 ${
                            p.passRate >= 80 
                              ? 'bg-emerald-500' 
                              : p.passRate >= 50 
                              ? 'bg-indigo-500' 
                              : 'bg-rose-500'
                          }"
                          style="width: ${p.passRate}%"
                        ></div>
                      </div>

                      <div class="flex justify-between items-center text-xs text-gray-400 dark:text-slate-500 border-b border-gray-100/50 dark:border-slate-800/50 pb-2.5">
                        <span>
                          Trạng thái: <strong>${p.activeCount}</strong> đang chạy / <strong>${p.completedCount}</strong> đã xong
                        </span>
                        <span>
                          Tổng: ${totalProjTasks} công việc
                        </span>
                      </div>

                      <!-- Danh sách các công việc cụ thể thuộc dự án này -->
                      <div class="space-y-2">
                        <p class="text-[11px] font-bold text-gray-500 dark:text-slate-400 uppercase tracking-wider">
                          Công việc thực hiện (${p.allTasks.length}):
                        </p>
                        <div class="grid grid-cols-1 gap-2 max-h-56 overflow-y-auto pr-1">
                          ${tasksHTML}
                        </div>
                      </div>
                    </div>
                    `;
                  }).join('')
            }
          </div>
        </div>
      </div>

      <!-- 3. Chi tiết từng dự án & Tổng hợp Nhận xét / Bài học cần khắc phục -->
      <div class="bg-white dark:bg-slate-900 rounded-2xl border border-gray-100 dark:border-slate-800 p-6 shadow-sm transition-colors duration-200">
        <div class="flex items-center gap-2 mb-6 border-b border-gray-50 dark:border-slate-800 pb-3">
          <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5s-3.332.477-4.5 1.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
          <h3 class="font-bold text-gray-800 dark:text-white">Tổng Hợp Bài Học Kinh Nghiệm & Khắc Phục</h3>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
          ${
            projectStats.length === 0 
              ? `<div class="lg:col-span-3 text-center py-12 text-gray-400 dark:text-slate-500 text-sm">Chưa có dự án và dữ liệu phân tích nào được tạo.</div>`
              : projectStats.map(proj => {
                  const remarksHTML = proj.remarksList.length === 0 
                    ? `<div class="text-center py-8 text-gray-400 dark:text-slate-500 text-xs">Chưa có ghi chép đánh giá nào cho dự án này.</div>`
                    : proj.remarksList.map((item, idx) => {
                        const isPass = item.evaluation === 'Dat';
                        return `
                        <div class="p-3 rounded-lg border text-xs space-y-1.5 transition duration-150 ${
                          isPass 
                            ? 'bg-emerald-50/10 dark:bg-emerald-950/10 border-emerald-100/40 dark:border-emerald-900/30' 
                            : 'bg-rose-50/10 dark:bg-rose-950/10 border-rose-100/40 dark:border-rose-900/30'
                        }">
                          <div class="flex items-center justify-between">
                            <span class="font-semibold text-gray-500 dark:text-slate-400">Mục #${idx + 1}</span>
                            <span class="flex items-center gap-0.5 font-bold ${
                              isPass ? 'text-emerald-700 dark:text-emerald-400' : 'text-rose-700 dark:text-rose-400'
                            }">
                              ${
                                isPass 
                                  ? `<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg> <span>Đạt</span>`
                                  : `<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg> <span>Không đạt</span>`
                              }
                            </span>
                          </div>
                          
                          <p class="text-gray-700 dark:text-slate-300 font-medium line-clamp-2" title="${item.content}">
                            <strong>Việc:</strong> ${item.content}
                          </p>
                          
                          <div class="pt-1.5 border-t border-dashed border-gray-100 dark:border-slate-800 text-gray-600 dark:text-slate-400">
                            <p class="italic font-normal">
                              <strong>Ghi chép:</strong> ${item.remarks}
                            </p>
                          </div>
                          
                          <p class="text-[10px] text-gray-400 dark:text-slate-500 text-right pt-0.5 font-mono">
                            Xong: ${formatReadableDateTime(item.completedAt)}
                          </p>
                        </div>
                        `;
                      }).join('');

                  return `
                    <div class="bg-gray-50/50 dark:bg-slate-950/40 rounded-xl p-5 border border-gray-100/80 dark:border-slate-800 flex flex-col justify-between space-y-4">
                      <div>
                        <div class="flex items-start justify-between gap-2 border-b border-gray-100 dark:border-slate-800 pb-2 mb-3">
                          <h4 class="font-bold text-gray-800 dark:text-slate-200 text-sm line-clamp-2" title="${proj.name}">
                            ${proj.name}
                          </h4>
                          <span class="text-[10px] px-2 py-0.5 rounded-full font-bold shrink-0 ${
                            proj.passRate >= 80 
                              ? 'bg-emerald-100 dark:bg-emerald-950/50 text-emerald-800 dark:text-emerald-400' 
                              : proj.passRate >= 50 
                              ? 'bg-indigo-100 dark:bg-indigo-950/50 text-indigo-800 dark:text-indigo-400' 
                              : 'bg-rose-100 dark:bg-rose-950/50 text-rose-800 dark:text-rose-400'
                          }">
                            Đạt ${proj.passRate}%
                          </span>
                        </div>

                        <!-- Sổ ghi chép bài học -->
                        <div class="space-y-3 max-h-[320px] overflow-y-auto pr-1">
                          ${remarksHTML}
                        </div>
                      </div>

                      <div class="pt-3 border-t border-gray-100 dark:border-slate-800 text-xs text-gray-400 dark:text-slate-500 flex justify-between">
                        <span>Hoàn thành: <strong>${proj.completedCount}</strong> việc</span>
                        <span>Đang chạy: <strong>${proj.activeCount}</strong> việc</span>
                      </div>
                    </div>
                  `;
                }).join('')
          }
        </div>
      </div>

      <!-- Quick Reset System Data Button -->
      <div class="flex justify-center mt-6">
        <button id="reset-system-btn" onclick="triggerResetData()" class="flex items-center gap-1.5 px-4 py-2 border border-gray-200 dark:border-slate-800 rounded-xl text-xs text-gray-500 hover:text-red-600 dark:text-slate-400 dark:hover:text-red-400 hover:bg-red-50/50 dark:hover:bg-red-950/20 transition cursor-pointer font-medium">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
          <span>Đặt Lại Toàn Bộ Dữ Liệu Gốc (Reset)</span>
        </button>
      </div>
      `;

      document.getElementById('view-dashboard').innerHTML = html;
    }

    // ---------------------------------------------------------
    // 5. RENDERING VIEWS: TASKS LOG (Add, Edit, Filter, List)
    // ---------------------------------------------------------
    function renderTasksList() {
      const container = document.getElementById('tasks-log-list');
      const nowMs = Date.now();

      // Set Date Input values default if blank
      if (!document.getElementById('task-form-start-time').value) {
        document.getElementById('task-form-start-time').value = formatDateTimeLocal(new Date());
      }
      if (!document.getElementById('task-form-plan-end').value) {
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('task-form-plan-end').value = formatDateTimeLocal(tomorrow);
      }

      // Filter tasks
      let filtered = [...state.tasks];

      // Search Query filter
      if (state.searchQuery) {
        filtered = filtered.filter(t => t.content.toLowerCase().includes(state.searchQuery));
      }

      // Project filter
      if (state.filterProjectId !== 'all') {
        filtered = filtered.filter(t => t.projectId === state.filterProjectId);
      }

      // Status tab filter
      if (state.filterStatus === 'pending') {
        filtered = filtered.filter(t => !t.isCompleted);
      } else if (state.filterStatus === 'completed') {
        filtered = filtered.filter(t => t.isCompleted);
      } else if (state.filterStatus === 'overdue') {
        filtered = filtered.filter(t => !t.isCompleted && new Date(t.planEndTime).getTime() < nowMs);
      }

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="bg-white dark:bg-slate-900 border border-gray-100 dark:border-slate-800 p-12 text-center rounded-2xl shadow-xs">
            <svg class="w-12 h-12 text-gray-300 dark:text-slate-700 mx-auto mb-3" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
            </svg>
            <p class="text-xs text-gray-500 dark:text-slate-400 font-bold">Không tìm thấy công việc tương ứng!</p>

    // ---------------------------------------------------------
    // 7. EVENT HANDLERS & OPERATIONS (CRUD Tasks & Projects)
    // ---------------------------------------------------------
    function handleTaskFormSubmit(e) {
      e.preventDefault();
      const errEl = document.getElementById('task-form-error');
      errEl.classList.add('hidden');

      const taskId = document.getElementById('edit-task-id').value;
      const projectId = document.getElementById('task-form-project-id').value;
      const content = document.getElementById('task-form-content').value.trim();
      const startTime = document.getElementById('task-form-start-time').value;
      const planEndTime = document.getElementById('task-form-plan-end').value;

      if (!projectId) {
        showFormError('task-form-error', 'Vui lòng lựa chọn dự án / gói thầu!');
        return;
      }
      if (!content) {
        showFormError('task-form-error', 'Vui lòng ghi nội dung công việc cụ thể!');
        return;
      }

      const startMs = new Date(startTime).getTime();
      const endMs = new Date(planEndTime).getTime();
      if (endMs <= startMs) {
        showFormError('task-form-error', 'Thời hạn hoàn thành kế hoạch phải sau thời gian bắt đầu!');
        return;
      }

      if (taskId) {
        // Edit Mode
        const taskIdx = state.tasks.findIndex(t => t.id === taskId);
        if (taskIdx > -1) {
          state.tasks[taskIdx].projectId = projectId;
          state.tasks[taskIdx].content = content;
          state.tasks[taskIdx].startTime = startTime;
          state.tasks[taskIdx].planEndTime = planEndTime;
          showToast('Đã lưu chỉnh sửa công việc thành công!');
        }
      } else {
        // Create Mode
        const newTask = {
          id: 'task-' + Date.now(),
          projectId,
          content,
          startTime,
          planEndTime,
          isCompleted: false
        };
        state.tasks.unshift(newTask);
        showToast('Đã thêm công việc mới vào nhật ký!');
      }

      saveState();
      resetTaskForm();
      renderApp();
    }

    function showFormError(elId, msg) {
      const el = document.getElementById(elId);
      el.innerText = msg;
      el.classList.remove('hidden');
    }

    function handleEditTask(taskId) {
      const task = state.tasks.find(t => t.id === taskId);
      if (!task) return;

      document.getElementById('edit-task-id').value = task.id;
      document.getElementById('task-form-project-id').value = task.projectId;
      document.getElementById('task-form-content').value = task.content;
      document.getElementById('task-form-start-time').value = task.startTime.substring(0, 16);
      document.getElementById('task-form-plan-end').value = task.planEndTime.substring(0, 16);

      document.getElementById('form-task-title').innerText = 'Chỉnh sửa Công Việc';
      document.getElementById('task-form-cancel-btn').classList.remove('hidden');
      
      // Auto scroll to form on mobile
      document.getElementById('task-form').scrollIntoView({ behavior: 'smooth' });
    }

    function resetTaskForm() {
      document.getElementById('edit-task-id').value = '';
      document.getElementById('task-form-project-id').value = '';
      document.getElementById('task-form-content').value = '';
      document.getElementById('task-form-start-time').value = formatDateTimeLocal(new Date());
      
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      document.getElementById('task-form-plan-end').value = formatDateTimeLocal(tomorrow);

      document.getElementById('form-task-title').innerText = 'Thêm Nhiệm Vụ Mới';
      document.getElementById('task-form-cancel-btn').classList.add('hidden');
      document.getElementById('task-form-error').classList.add('hidden');
    }

    function handleDeleteTask(taskId) {
      if (confirm('Bạn có chắc chắn muốn xóa công việc này khỏi nhật ký theo dõi? Hành động này không thể hoàn tác!')) {
        state.tasks = state.tasks.filter(t => t.id !== taskId);
        saveState();
        renderApp();
        showToast('Đã xóa công việc khỏi nhật ký thành công!', 'error');
      }
    }

    function reopenTask(taskId) {
      const idx = state.tasks.findIndex(t => t.id === taskId);
      if (idx > -1) {
        state.tasks[idx].isCompleted = false;
        delete state.tasks[idx].completedAt;
        delete state.tasks[idx].evaluation;
        delete state.tasks[idx].remarks;
        saveState();
        renderApp();
        showToast('Đã khôi phục lại trạng thái đang thực hiện cho công việc!');
      }
    }

    // Project Form Submit
    function handleProjectFormSubmit(e) {
      e.preventDefault();
      const errEl = document.getElementById('project-form-error');
      errEl.classList.add('hidden');

      const projectId = document.getElementById('edit-project-id').value;
      const name = document.getElementById('project-form-name').value.trim();

      if (!name) {
        showFormError('project-form-error', 'Vui lòng điền tên gói thầu / dự án cụ thể!');
        return;
      }

      if (projectId) {
        // Edit project
        const idx = state.projects.findIndex(p => p.id === projectId);
        if (idx > -1) {
          state.projects[idx].name = name;
          showToast('Đã lưu chỉnh sửa tên gói thầu thành công!');
        }
      } else {
        // Create project
        const newProj = {
          id: 'proj-' + Date.now(),
          name,
          createdAt: new Date().toISOString()
        };
        state.projects.unshift(newProj);
        showToast('Đã thêm gói thầu theo dõi mới thành công!');
      }

      saveState();
      resetProjectForm();
      renderApp();
    }

    function handleEditProject(projectId) {
      const proj = state.projects.find(p => p.id === projectId);
      if (!proj) return;

      document.getElementById('edit-project-id').value = proj.id;
      document.getElementById('project-form-name').value = proj.name;
      document.getElementById('form-project-title').innerText = 'Chỉnh sửa tên Gói thầu';
      document.getElementById('project-form-cancel-btn').classList.remove('hidden');

      document.getElementById('project-form').scrollIntoView({ behavior: 'smooth' });
    }

    function resetProjectForm() {
      document.getElementById('edit-project-id').value = '';
      document.getElementById('project-form-name').value = '';
      document.getElementById('form-project-title').innerText = 'Tạo Gói Thầu Mới';
      document.getElementById('project-form-cancel-btn').classList.add('hidden');
      document.getElementById('project-form-error').classList.add('hidden');
    }

    function handleDeleteProject(projectId) {
      const projTasks = state.tasks.filter(t => t.projectId === projectId);
      const confirmMsg = projTasks.length > 0 
        ? `Gói thầu này đang có ${projTasks.length} công việc đính kèm! Xóa gói thầu sẽ đồng thời xóa toàn bộ công việc liên quan. Bạn có chắc chắn muốn xóa không?`
        : `Bạn có chắc chắn muốn xóa hoàn toàn gói thầu này khỏi danh sách?`;

      if (confirm(confirmMsg)) {
        state.projects = state.projects.filter(p => p.id !== projectId);
        state.tasks = state.tasks.filter(t => t.projectId !== projectId);
        saveState();
        renderApp();
        showToast('Đã xóa gói thầu và toàn bộ công việc liên quan!', 'error');
      }
    }

    // ---------------------------------------------------------
    // 8. KPI EVALUATION MODAL ACTIONS
    // ---------------------------------------------------------
    function openEvaluationModal(taskId) {
      const task = state.tasks.find(t => t.id === taskId);
      if (!task) return;

      state.isEvaluatingTaskId = taskId;
      document.getElementById('eval-task-content').innerText = `"${task.content}"`;
      document.getElementById('eval-remarks').value = '';
      document.getElementById('eval-modal-error').classList.add('hidden');
      setEvalSelection('Dat');

      document.getElementById('evaluation-modal').classList.remove('hidden');
    }

    function closeEvalModal() {
      document.getElementById('evaluation-modal').classList.add('hidden');
      state.isEvaluatingTaskId = null;
    }

    function setEvalSelection(status) {
      state.evaluatingSelection = status;
      const passBtn = document.getElementById('eval-opt-pass');
      const failBtn = document.getElementById('eval-opt-fail');

      if (status === 'Dat') {
        passBtn.className = "flex items-center justify-center gap-2 py-2.5 px-4 rounded-xl border border-emerald-500 bg-emerald-50 dark:bg-emerald-950/30 text-emerald-800 dark:text-emerald-400 ring-4 ring-emerald-500/10 font-bold text-xs transition cursor-pointer";
        failBtn.className = "flex items-center justify-center gap-2 py-2.5 px-4 rounded-xl border border-gray-200 dark:border-slate-800 bg-white dark:bg-slate-950 text-gray-500 dark:text-slate-400 font-bold text-xs transition cursor-pointer";
      } else {
        passBtn.className = "flex items-center justify-center gap-2 py-2.5 px-4 rounded-xl border border-gray-200 dark:border-slate-800 bg-white dark:bg-slate-950 text-gray-500 dark:text-slate-400 font-bold text-xs transition cursor-pointer";
        failBtn.className = "flex items-center justify-center gap-2 py-2.5 px-4 rounded-xl border border-rose-500 bg-rose-50 dark:bg-rose-950/30 text-rose-800 dark:text-rose-400 ring-4 ring-rose-500/10 font-bold text-xs transition cursor-pointer";
      }
    }

    function saveEvaluation() {
      const remarks = document.getElementById('eval-remarks').value.trim();
      const errEl = document.getElementById('eval-modal-error');

      if (!remarks) {
        errEl.innerText = 'Vui lòng ghi chú nhận xét hoặc giải pháp chất lượng làm bài học kinh nghiệm!';
        errEl.classList.remove('hidden');
        return;
      }

      const taskIdx = state.tasks.findIndex(t => t.id === state.isEvaluatingTaskId);
      if (taskIdx > -1) {
        state.tasks[taskIdx].isCompleted = true;
        state.tasks[taskIdx].completedAt = new Date().toISOString();
        state.tasks[taskIdx].evaluation = state.evaluatingSelection;
        state.tasks[taskIdx].remarks = remarks;

        saveState();
        closeEvalModal();
        renderApp();
        showToast('Nghiệm thu đánh giá KPI chất lượng thành công!');
      }
    }

    // ---------------------------------------------------------
    // 9. EXPORT DATABASE REPORT TO EXCEL (CSV WITH UTF-8 BOM)
    // ---------------------------------------------------------
    function exportTasksToCSV() {
      const headers = [
        'Mã công việc',
        'Tên Dự án/Gói thầu',
        'Nội dung công việc',
        'Thời gian bắt đầu',
        'Hạn chót kế hoạch',
        'Trạng thái',
        'Thời gian thực tế nghiệm thu',
        'Kết quả đánh giá',
        'Nhận xét / Bài học rút ra'
      ];

      const rows = state.tasks.map(task => {
        const project = state.projects.find(p => p.id === task.projectId);
        const projectName = project ? project.name : 'Không xác định';

        let statusText = 'Đang thực hiện';
        if (task.isCompleted) {
          statusText = 'Đã nghiệm thu';
        } else {
          const isOverdue = new Date(task.planEndTime).getTime() < Date.now();
          if (isOverdue) statusText = 'Trễ hạn';
        }

        const evalText = task.isCompleted
          ? (task.evaluation === 'Dat' ? 'Đạt yêu cầu' : 'Chưa đạt')
          : 'Chưa đánh giá';

        return [
          task.id,
          projectName,
          task.content,
          formatReadableDateTime(task.startTime),
          formatReadableDateTime(task.planEndTime),
          statusText,
          task.completedAt ? formatReadableDateTime(task.completedAt) : '',
          evalText,
          task.remarks || ''
        ];
      });

      const csvContent = [
        headers.map(h => `"${h.replace(/"/g, '""')}"`).join(','),
        ...rows.map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))
      ].join('\r\n');

      // Export using UTF-8 BOM to display accented Vietnamese correctly in Excel
      const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], {
        type: 'text/csv;charset=utf-8;'
      });

      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      
      const date = new Date();
      const dateStr = `${String(date.getDate()).padStart(2, '0')}-${String(date.getMonth() + 1).padStart(2, '0')}-${date.getFullYear()}`;
      
      link.href = url;
      link.setAttribute('download', `Bao_Cao_Tien_Do_Tender_KPI_${dateStr}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);

      showToast('Đã tải xuống file báo cáo Excel thành công!');
    }

    // Expose dynamic handlers globally
    window.triggerResetData = function() {
      if (confirm('Bạn có chắc chắn muốn đặt lại dữ liệu ban đầu không? Mọi thay đổi hiện tại của bạn sẽ bị mất!')) {
        localStorage.removeItem(STORAGE_KEY_PROJECTS);
        localStorage.removeItem(STORAGE_KEY_TASKS);
        state.projects = getMockProjects();
        state.tasks = getMockTasks();
        saveState();
        renderApp();
        showToast('Đã đặt lại dữ liệu gốc thành công!');
      }
    };
    
    window.exportTasksToCSV = exportTasksToCSV;

    // Launch App
    document.addEventListener('DOMContentLoaded', initApp);
  </script>
