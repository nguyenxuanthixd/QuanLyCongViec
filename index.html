      // ==========================================
      // DATE/TIME UTILITIES
      // ==========================================
      function formatDateTimeLocal(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        return `${year}-${month}-${day}T${hours}:${minutes}`;
      }

      function formatReadableDateTime(isoString) {
        if (!isoString) return '';
        const date = new Date(isoString);
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const year = date.getFullYear();
        return `${hours}:${minutes} ngày ${day}/${month}/${year}`;
      }

      function getRemainingTimeText(planEndTimeStr) {
        const diff = new Date(planEndTimeStr).getTime() - Date.now();

        if (diff <= 0) {
          return { text: 'TRỄ HẠN', isOverdue: true };
        }

        const minutesTotal = Math.floor(diff / (60 * 1000));
        const hoursTotal = Math.floor(diff / (60 * 60 * 1000));
        const days = Math.floor(diff / (24 * 60 * 60 * 1000));

        if (days > 0) {
          const remainingHours = hoursTotal % 24;
          return {
            text: `Còn ${days} ngày${remainingHours > 0 ? ` ${remainingHours} giờ` : ''}`,
            isOverdue: false,
          };
        }

        if (hoursTotal > 0) {
          const remainingMinutes = minutesTotal % 60;
          return {
            text: `Còn ${hoursTotal} giờ${remainingMinutes > 0 ? ` ${remainingMinutes} phút` : ''}`,
            isOverdue: false,
          };
        }

        return {
          text: `Còn ${minutesTotal > 0 ? minutesTotal : 1} phút`,
          isOverdue: false,
        };
      }

      // ==========================================
      // EXPORT TO EXCEL (CSV UTF-8 with BOM)
      // ==========================================
      function exportTasksToCSV(projects, tasks) {
        const headers = [
          'Mã công việc',
          'Tên Dự án',
          'Nội dung công việc',
          'Thời gian bắt đầu',
          'Hạn chót kế hoạch',
          'Trạng thái',
          'Thời gian thực tế hoàn thành',
          'Kết quả đánh giá',
          'Nhận xét / Bài học rút ra'
        ];

        const rows = tasks.map(task => {
          const project = projects.find(p => p.id === task.projectId);
          const projectName = project ? project.name : 'Không xác định';

          let statusText = 'Đang thực hiện';
          if (task.isCompleted) {
            statusText = 'Đã hoàn thành';
          } else {
            const isOverdue = new Date(task.planEndTime).getTime() < Date.now();
            if (isOverdue) {
              statusText = 'Trễ hạn';
            }
          }

          const evalText = task.isCompleted
            ? (task.evaluation === 'Dat' ? 'Đạt yêu cầu' : 'Không đạt')
            : 'Chưa đánh giá';

          return [
            task.id,
            projectName,
            task.content,
            formatReadableDateTime(task.startTime),
            formatReadableDateTime(task.planEndTime),
            statusText,
            task.completedAt ? formatReadableDateTime(task.completedAt) : '',
            evalText,
            task.remarks || ''
          ];
        });

        const csvContent = [
          headers.map(h => `"${h.replace(/"/g, '""')}"`).join(','),
          ...rows.map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))
        ].join('\r\n');

        const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], {
          type: 'text/csv;charset=utf-8;'
        });

        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        
        const date = new Date();
        const day = String(date.getDate()).padStart(2, '0');
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const year = date.getFullYear();
        const dateStr = `${day}-${month}-${year}`;
        
        link.href = url;
        link.setAttribute('download', `bao_cao_theo_doi_va_hieu_suat_${dateStr}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      }

      // ==========================================
      // COMPONENT: TASK FORM
      // ==========================================
      function TaskForm({ projects, onAddTask, onAddProject }) {
        const [selectedProjectId, setSelectedProjectId] = useState('');
        const [content, setContent] = useState('');
        
        const [startTime, setStartTime] = useState(() => formatDateTimeLocal(new Date()));
        const [planEndTime, setPlanEndTime] = useState(() => {
          const tomorrow = new Date();
          tomorrow.setDate(tomorrow.getDate() + 1);
          return formatDateTimeLocal(tomorrow);
        });

        const [isAddingProject, setIsAddingProject] = useState(false);
        const [newProjectName, setNewProjectName] = useState('');
        const [projectError, setProjectError] = useState('');
        const [formError, setFormError] = useState('');
        const [successMsg, setSuccessMsg] = useState('');

        const handleQuickAddProject = () => {
          if (!newProjectName.trim()) {
            setProjectError('Vui lòng nhập tên dự án!');
            return;
          }
          const newId = onAddProject(newProjectName.trim());
          setSelectedProjectId(newId);
          setNewProjectName('');
          setIsAddingProject(false);
          setProjectError('');
        };

        const handleSubmit = (e) => {
          e.preventDefault();
          setFormError('');
          setSuccessMsg('');

          if (!selectedProjectId) {
            setFormError('Vui lòng chọn hoặc thêm một dự án!');
            return;
          }
          if (!content.trim()) {
            setFormError('Vui lòng nhập nội dung công việc!');
            return;
          }
          if (!startTime) {
            setFormError('Vui lòng chọn thời gian bắt đầu!');
            return;
          }
          if (!planEndTime) {
            setFormError('Vui lòng chọn kế hoạch hoàn thành!');
            return;
          }

          const startMs = new Date(startTime).getTime();
          const endMs = new Date(planEndTime).getTime();

          if (endMs <= startMs) {
            setFormError('Kế hoạch hoàn thành phải sau Thời gian bắt đầu!');
            return;
          }

          onAddTask({
            projectId: selectedProjectId,
            content: content.trim(),
            startTime,
            planEndTime,
          });

          setContent('');
          setStartTime(formatDateTimeLocal(new Date()));
          const nextDay = new Date();
          nextDay.setDate(nextDay.getDate() + 1);
          setPlanEndTime(formatDateTimeLocal(nextDay));

          setSuccessMsg('Đã thêm công việc mới thành công!');
          setTimeout(() => {
            setSuccessMsg('');
          }, 3000);
        };

        return (
          <div className="bg-white dark:bg-slate-900 rounded-2xl border border-gray-100 dark:border-slate-800 p-6 shadow-sm transition-colors duration-200">
            <div className="flex items-center gap-2 mb-5 border-b border-gray-50 dark:border-slate-800/80 pb-3">
              <span className="text-indigo-600 dark:text-indigo-400">
                <Icons.TaskList />
              </span>
              <h3 className="font-semibold text-lg text-gray-800 dark:text-white">Thêm Công Việc Mới</h3>
            </div>

            <form onSubmit={handleSubmit} className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-gray-700 dark:text-slate-300 mb-1">
                  Dự án / Gói thầu <span className="text-red-500">*</span>
                </label>

                {!isAddingProject ? (
                  <div className="flex gap-2">

      // ==========================================
      // COMPONENT: DASHBOARD OVERVIEW
      // ==========================================
      function Dashboard({ projects, tasks, onSelectProjectFilter, onSelectTab }) {
        const nowMs = Date.now();

        const totalProjects = projects.length;
        
        const activeProjectsCount = projects.filter(p => {
          const projTasks = tasks.filter(t => t.projectId === p.id);
          return projTasks.some(t => !t.isCompleted);
        }).length;

        const totalTasksCreated = tasks.length;
        const completedTasks = tasks.filter(t => t.isCompleted);
        const completedTasksCount = completedTasks.length;

        const overdueTasksCount = tasks.filter(
          t => !t.isCompleted && new Date(t.planEndTime).getTime() < nowMs
        ).length;

        const completedOnTime = completedTasks.filter(t => {
          const completedTime = new Date(t.completedAt).getTime();
          const planEndTime = new Date(t.planEndTime).getTime();
          return completedTime <= planEndTime;
        });
        const completedOnTimeCount = completedOnTime.length;

        const kpiRate = completedTasksCount > 0 
          ? Math.round((completedOnTimeCount / completedTasksCount) * 100) 
          : 0;

        const projectStats = projects.map(proj => {
          const projTasks = tasks.filter(t => t.projectId === proj.id);
          const activeCount = projTasks.filter(t => !t.isCompleted).length;
          const completedCount = projTasks.filter(t => t.isCompleted).length;
          
          const passedTasks = projTasks.filter(t => t.isCompleted && t.evaluation === 'Dat');
          const passRate = completedCount > 0 
            ? Math.round((passedTasks.length / completedCount) * 100) 
            : 0;

          const remarksList = projTasks
            .filter(t => t.isCompleted && t.remarks && t.remarks.trim() !== '')
            .map(t => ({
              taskId: t.id,
              content: t.content,
              evaluation: t.evaluation,
              remarks: t.remarks || '',
              completedAt: t.completedAt || '',
            }));

          return {
            ...proj,
            activeCount,
            completedCount,
            passRate,
            remarksList,
            allTasks: projTasks,
          };
        });

        // Filter out all remarks/lessons learned from projects for "Lessons Feed"
        const allRemarks = useMemo(() => {
          const list = [];
          tasks.forEach(t => {
            if (t.isCompleted && t.remarks && t.remarks.trim() !== '') {
              const p = projects.find(proj => proj.id === t.projectId);
              list.push({
                taskId: t.id,
                taskContent: t.content,
                projectName: p ? p.name : 'Không rõ dự án',
                evaluation: t.evaluation,
                remarks: t.remarks,
                completedAt: t.completedAt,
              });
            }
          });
          // Sort by latest completed
          return list.sort((a, b) => new Date(b.completedAt).getTime() - new Date(a.completedAt).getTime());
        }, [tasks, projects]);

        return (

                      <span>Xong đúng hạn:</span>
                    </span>
                    <strong className="text-white">{completedOnTimeCount} việc</strong>
                  </div>
                  <div className="flex items-center justify-between text-xs text-indigo-200 mt-1">
                    <span className="flex items-center gap-1.5">
                      <span className="w-2 h-2 bg-indigo-400 rounded-full"></span>
                      <span>Tổng đã hoàn thành:</span>
                    </span>
                    <strong className="text-white">{completedTasksCount} việc</strong>
                  </div>
                </div>

                <div className="border-t border-indigo-900/60 pt-3 mt-4">
                  <p className="text-xs text-indigo-200 italic">
                    {kpiRate >= 80 
                      ? 'Xuất sắc! Tiến độ phối hợp và lập hồ sơ thầu cực kỳ chuẩn xác.' 
                      : kpiRate >= 50 
                      ? 'Khá tốt! Hãy chú ý kiểm soát chặt chẽ các mốc bàn giao trung gian.' 
                      : completedTasksCount === 0 
                      ? 'Chưa có dữ liệu đánh giá tiến độ thực tế.' 
                      : 'Cảnh báo! Tỷ lệ trễ hạn cao. Cần rút ngắn quy trình lập và duyệt hồ sơ.'}
                  </p>
                </div>
              </div>

              {/* Progress by project column */}
              <div className="bg-white dark:bg-slate-900 rounded-2xl border border-gray-100 dark:border-slate-800 p-6 shadow-sm md:col-span-2 transition-colors duration-200 flex flex-col justify-between">
                <div>
                  <div className="flex items-center justify-between mb-4 border-b border-gray-50 dark:border-slate-800 pb-3">
                    <div className="flex items-center gap-2">
                      <span className="text-indigo-650 dark:text-indigo-400">
                        <Icons.Dashboard />
                      </span>
                      <h3 className="font-semibold text-gray-800 dark:text-white">Hiệu Suất Kỹ Thuật Gói Thầu</h3>
                    </div>
                    <span className="text-xs text-gray-400 dark:text-slate-500 font-medium">Tỷ lệ Đạt yêu cầu</span>
                  </div>

                  <div className="space-y-4 max-h-[340px] overflow-y-auto pr-1">
                    {projectStats.map(p => {
                      const totalProjTasks = p.activeCount + p.completedCount;
                      return (
                        <div key={p.id} className="bg-gray-50/50 dark:bg-slate-950/40 rounded-xl p-3.5 border border-gray-100/50 dark:border-slate-800/60 space-y-2">
                          <div className="flex items-start justify-between gap-4 text-sm">
                            <span 
                              onClick={() => {
                                onSelectProjectFilter(p.id);
                                onSelectTab('tasks');
                              }}
                              className="font-bold text-gray-800 dark:text-slate-200 hover:text-indigo-600 dark:hover:text-indigo-400 cursor-pointer transition duration-150 text-xs sm:text-sm line-clamp-2" 
                              title="Bấm để xem danh sách công việc dự án này"
                            >
                              {p.name}
                            </span>
                            <span className={`text-[11px] font-bold px-2 py-0.5 rounded-md border shrink-0 ${
                              p.passRate >= 80 
                                ? 'bg-emerald-50 dark:bg-emerald-950/35 border-emerald-100 text-emerald-700'
                                : p.passRate >= 55
                                ? 'bg-indigo-50 dark:bg-indigo-950/35 border-indigo-100 text-indigo-700'
                                : 'bg-rose-50 dark:bg-rose-950/35 border-rose-100 text-rose-700'
                            }`}>
                              Đạt: {p.passRate}%
                            </span>
                          </div>
                          
                          <div className="h-2 w-full bg-gray-100 dark:bg-slate-800 rounded-full overflow-hidden">
                            <div 
                              className={`h-full rounded-full transition-all duration-500 ${
                                p.passRate >= 80 
                                  ? 'bg-emerald-500' 
                                  : p.passRate >= 55 
                                  ? 'bg-indigo-500' 
                                  : 'bg-rose-500'
                              }`}
                              style={{ width: `${p.passRate}%` }}
                            ></div>
                          </div>

                          <div className="flex justify-between items-center text-xs text-gray-400 dark:text-slate-500">
                            <span>
                              Thực hiện: <strong>{p.activeCount}</strong> đang chạy / <strong>{p.completedCount}</strong> đã duyệt
                            </span>
                            <span>Tổng số mốc: {totalProjTasks}</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                <div className="border-t border-gray-50 dark:border-slate-800 pt-4 mt-4 flex justify-between items-center">
                  <span className="text-xs text-gray-450 dark:text-slate-500">Bấm tên dự án để chuyển đến quản lý mốc thầu.</span>
                  <button 
                    onClick={() => onSelectTab('projects')}
                    className="text-xs font-bold text-indigo-600 dark:text-indigo-450 hover:underline flex items-center gap-1 cursor-pointer"
                  >
                    <span>Quản lý gói thầu</span>
                    <Icons.ChevronRight />
                  </button>
                </div>

              </div>
            </div>

            {/* Corner of Lessons Learned Feed */}
            <div className="bg-white dark:bg-slate-900 rounded-2xl border border-gray-100 dark:border-slate-800 p-6 shadow-sm transition-colors duration-200">
              <div className="flex items-center justify-between mb-4 border-b border-gray-50 dark:border-slate-800 pb-3">
                <div className="flex items-center gap-2">
                  <span className="text-indigo-650 dark:text-indigo-400">
                    <Icons.Award />
                  </span>
                  <h3 className="font-semibold text-gray-800 dark:text-white">Nhật Ký Đấu Thầu & Bài Học Kinh Nghiệm</h3>
                </div>
                <span className="text-xs bg-indigo-50 dark:bg-indigo-950/40 text-indigo-650 dark:text-indigo-400 font-bold px-2.5 py-1 rounded-md border border-indigo-100/50">
                  {allRemarks.length} bài học thực tế
                </span>
              </div>

              {allRemarks.length === 0 ? (
                <div className="text-center py-8 text-gray-400 dark:text-slate-500 text-sm italic">
                  Chưa ghi nhận bài học kinh nghiệm nào. Các nhận xét sẽ tự động xuất hiện sau khi bạn hoàn thành và đánh giá các mốc công việc thầu.
                </div>
              ) : (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[400px] overflow-y-auto pr-1">
                  {allRemarks.map((rem, i) => (
                    <div 
                      key={rem.taskId + i} 
                      className={`rounded-xl p-4 border transition duration-150 ${
                        rem.evaluation === 'Dat'
                          ? 'bg-emerald-50/20 dark:bg-emerald-950/10 border-emerald-100/40 dark:border-emerald-900/15'
                          : 'bg-rose-50/20 dark:bg-rose-950/10 border-rose-100/40 dark:border-rose-900/15'
                      }`}
                    >
                      <div className="flex items-center justify-between gap-3 text-xs mb-2 border-b border-gray-100 dark:border-slate-800/50 pb-1.5">
                        <span className="font-bold text-gray-400 dark:text-slate-500 truncate max-w-[200px]" title={rem.projectName}>
                          {rem.projectName}
                        </span>
                        <span className={`font-semibold shrink-0 ${rem.evaluation === 'Dat' ? 'text-emerald-600' : 'text-rose-600'}`}>
                          {rem.evaluation === 'Dat' ? '✓ Đạt kỹ thuật' : '✗ Cần khắc phục'}
                        </span>
                      </div>
                      
                      <p className="text-xs font-bold text-gray-800 dark:text-slate-200 mb-1.5 line-clamp-2 italic">
                        "{rem.taskContent}"
                      </p>
                      
                      <div className="text-xs text-gray-650 dark:text-slate-350 bg-white/60 dark:bg-slate-950/40 p-2.5 rounded-lg border border-gray-100/40 dark:border-slate-850">
                        <strong className="text-[10px] uppercase font-bold text-indigo-650 dark:text-indigo-400 block mb-1">Rút kinh nghiệm:</strong>
                        <p className="leading-relaxed whitespace-pre-wrap">{rem.remarks}</p>
                      </div>

                      <div className="text-[10px] text-gray-405 dark:text-slate-500 text-right mt-2 font-mono">
                        Duyệt ngày: {formatReadableDateTime(rem.completedAt)}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>

          </div>
        );
      }

      // ==========================================
      // MAIN APP CONTROLLER
      // ==========================================
      function App() {
        const [projects, setProjects] = useState([]);
        const [tasks, setTasks] = useState([]);
        
        const [isDarkMode, setIsDarkMode] = useState(() => {
          const stored = safeStorage.getItem('pms_dark_mode');
          return stored === 'true';
        });

        useEffect(() => {
          if (isDarkMode) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
          safeStorage.setItem('pms_dark_mode', String(isDarkMode));
        }, [isDarkMode]);
        
        const [currentTab, setCurrentTab] = useState('dashboard');
        const [statusFilter, setStatusFilter] = useState('all');
        const [projectFilter, setProjectFilter] = useState('all');
        const [searchQuery, setSearchQuery] = useState('');

        useEffect(() => {
          const storedProjects = safeStorage.getItem('pms_projects');
          const storedTasks = safeStorage.getItem('pms_tasks');

          if (storedProjects && storedTasks) {
            setProjects(JSON.parse(storedProjects));
            setTasks(JSON.parse(storedTasks));
          } else {
            const mockProj = getMockProjects();
            const mockTasks = getMockTasks();
            setProjects(mockProj);
            setTasks(mockTasks);
            safeStorage.setItem('pms_projects', JSON.stringify(mockProj));
            safeStorage.setItem('pms_tasks', JSON.stringify(mockTasks));
          }
        }, []);

        const saveProjects = (updatedProjects) => {
          setProjects(updatedProjects);
          safeStorage.setItem('pms_projects', JSON.stringify(updatedProjects));
        };

        const saveTasks = (updatedTasks) => {
          setTasks(updatedTasks);
          safeStorage.setItem('pms_tasks', JSON.stringify(updatedTasks));
        };

        const handleAddProject = (projectName) => {
          const newProject = {
            id: `proj-${Date.now()}`,
            name: projectName,
            createdAt: new Date().toISOString()
          };
          const updated = [...projects, newProject];
          saveProjects(updated);
          return newProject.id;
        };

        const handleAddProjectDirect = (e) => {
          e.preventDefault();
          const input = document.getElementById('direct-project-name');
          if (!input || !input.value.trim()) return;
          handleAddProject(input.value.trim());
          input.value = '';
        };

        const handleAddTask = (taskData) => {
          const newTask = {
            id: `task-${Date.now()}`,
            projectId: taskData.projectId,
            content: taskData.content,
            startTime: taskData.startTime,
            planEndTime: taskData.planEndTime,
            isCompleted: false,
          };
          const updated = [...tasks, newTask];
          saveTasks(updated);
        };

        // Modal State for Task Evaluation
        const [evalModalOpen, setEvalModalOpen] = useState(false);
        const [taskToEval, setTaskToEval] = useState(null);

        const handleToggleTaskStatus = (taskId) => {
          const task = tasks.find((t) => t.id === taskId);
          if (!task) return;

          if (!task.isCompleted) {
            // Opening evaluation modal on checking completed
            setTaskToEval(task);
            setEvalModalOpen(true);
          } else {
            // Mark incomplete directly
            const updated = tasks.map((t) => {
              if (t.id === taskId) {
                const { completedAt, evaluation, remarks, ...rest } = t;
                return { ...rest, isCompleted: false };
              }
              return t;
            });
            saveTasks(updated);
          }
        };

        const handleSaveTaskEvaluation = (evaluation, remarks) => {
          if (!taskToEval) return;
          const updated = tasks.map((t) => {
            if (t.id === taskToEval.id) {
              return {
                ...t,
                isCompleted: true,
                completedAt: new Date().toISOString(),
                evaluation,
                remarks
              };
            }
            return t;
          });
          saveTasks(updated);
          setEvalModalOpen(false);
          setTaskToEval(null);
        };

        const handleDeleteTask = (taskId) => {
          if (window.confirm('Bạn có chắc chắn muốn xóa mốc công việc này không?')) {
            const updated = tasks.filter((t) => t.id !== taskId);
            saveTasks(updated);
          }
        };

        const handleResetData = () => {
          if (window.confirm('Hành động này sẽ khôi phục lại dữ liệu mẫu gồm 3 Gói thầu và 6 Mốc công việc chính thức. Các thay đổi hiện tại của bạn sẽ bị ghi đè. Bạn có muốn tiếp tục không?')) {
            const mockProj = getMockProjects();
            const mockTasks = getMockTasks();
            saveProjects(mockProj);
            saveTasks(mockTasks);
          }
        };

        const handleDeleteProject = (projectId) => {
          const projTasks = tasks.filter(t => t.projectId === projectId);
          let confirmMsg = 'Bạn có chắc chắn muốn xóa Gói thầu này không?';
          if (projTasks.length > 0) {
            confirmMsg = `Cảnh báo! Gói thầu này đang chứa ${projTasks.length} mốc công việc thực hiện. Việc xóa gói thầu sẽ xóa toàn bộ các công việc đi kèm. Bạn vẫn muốn tiếp tục chứ?`;
          }
          if (window.confirm(confirmMsg)) {
            const updatedProjects = projects.filter(p => p.id !== projectId);
            const updatedTasks = tasks.filter(t => t.projectId !== projectId);
            saveProjects(updatedProjects);
            saveTasks(updatedTasks);
          }
        };

        // Real-time ticking remaining calculation
        const [currentTimeTick, setCurrentTimeTick] = useState(Date.now());
        useEffect(() => {
          const timer = setInterval(() => {
            setCurrentTimeTick(Date.now());
          }, 10000); // refresh time every 10 seconds
          return () => clearInterval(timer);
        }, []);

        // Inline Task Editing Mode
        const [editingTaskId, setEditingTaskId] = useState(null);
        const [editContent, setEditContent] = useState('');
        const [editStartTime, setEditStartTime] = useState('');
        const [editPlanEndTime, setEditPlanEndTime] = useState('');
        const [editProjectId, setEditProjectId] = useState('');

        const startEditTask = (task) => {
          setEditingTaskId(task.id);
          setEditContent(task.content);
          setEditStartTime(formatDateTimeLocal(new Date(task.startTime)));
          setEditPlanEndTime(formatDateTimeLocal(new Date(task.planEndTime)));
          setEditProjectId(task.projectId);
        };

        const handleSaveTaskEdit = (taskId) => {
          if (!editContent.trim()) {
            alert('Vui lòng nhập nội dung công việc!');
            return;
          }
          const updated = tasks.map(t => {
            if (t.id === taskId) {
              return {
                ...t,
                projectId: editProjectId,
                content: editContent.trim(),
                startTime: new Date(editStartTime).toISOString(),
                planEndTime: new Date(editPlanEndTime).toISOString(),
              };
            }
            return t;
          });
          saveTasks(updated);
          setEditingTaskId(null);
        };

        // Filtering Logic
        const filteredTasks = useMemo(() => {
          return tasks.filter((task) => {
            // Filter by search query
            const matchesSearch = task.content.toLowerCase().includes(searchQuery.toLowerCase());
            
            // Filter by project
            const matchesProject = projectFilter === 'all' || task.projectId === projectFilter;

            // Filter by status
            let matchesStatus = true;
            if (statusFilter === 'pending') {
              matchesStatus = !task.isCompleted;
            } else if (statusFilter === 'completed') {
              matchesStatus = task.isCompleted;
            } else if (statusFilter === 'overdue') {
              const isOverdue = !task.isCompleted && new Date(task.planEndTime).getTime() < currentTimeTick;
              matchesStatus = isOverdue;
            }

            return matchesSearch && matchesProject && matchesStatus;
          });
        }, [tasks, searchQuery, projectFilter, statusFilter, currentTimeTick]);

        return (
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            
            {/* Nav Header */}
            <header className="flex flex-col sm:flex-row items-center justify-between border-b border-gray-100 dark:border-slate-800 pb-5 mb-6 gap-4">
              <div className="flex items-center gap-3">
                <div className="bg-indigo-600 text-white p-2.5 rounded-2xl shadow-sm">
                  <Icons.Award />
                </div>
                <div>
                  <h1 className="text-xl sm:text-2xl font-black text-gray-900 dark:text-white font-display tracking-tight uppercase">
                    TENDER KPI <span className="text-indigo-600 dark:text-indigo-400 font-medium font-sans text-sm sm:text-base capitalize ml-1">Tracker</span>
                  </h1>
                  <p className="text-xs text-gray-500 dark:text-slate-400 font-medium">Báo Cáo Tiến Độ & Hiệu Suất Đấu Thầu Chuyên Nghiệp</p>
                </div>
              </div>

              <div className="flex items-center gap-2">
                {/* Dark mode switch */}
                <button
                  type="button"
                  id="theme-toggle-btn"
                  onClick={() => setIsDarkMode(!isDarkMode)}
                  className="p-2.5 rounded-xl border border-gray-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-gray-600 dark:text-slate-400 hover:bg-gray-100 dark:hover:bg-slate-850 transition duration-150 cursor-pointer"
                  title={isDarkMode ? "Chuyển sang Giao diện Sáng" : "Chuyển sang Giao diện Tối"}
                >
                  {isDarkMode ? <Icons.Sun /> : <Icons.Moon />}
                </button>

                {/* Reset system data */}
                <button
                  type="button"
                  id="reset-data-btn"
                  onClick={handleResetData}
                  className="flex items-center gap-1.5 px-3 py-2.5 text-xs text-gray-600 dark:text-slate-400 hover:text-rose-600 dark:hover:text-rose-450 border border-gray-200 dark:border-slate-800 bg-white dark:bg-slate-900 rounded-xl hover:bg-rose-50/40 dark:hover:bg-rose-950/20 transition duration-150 cursor-pointer"
                  title="Khôi phục lại dữ liệu mẫu gốc ban đầu"
                >
                  <Icons.Reset />
                  <span className="font-semibold hidden sm:inline">Khôi phục gốc</span>
                </button>
              </div>
            </header>

            {/* Menu Tabs Navigation */}
            <div className="flex border-b border-gray-100 dark:border-slate-800 pb-px mb-6 overflow-x-auto gap-2">
              <button
                id="tab-btn-dashboard"
                onClick={() => setCurrentTab('dashboard')}
                className={`flex items-center gap-2 px-5 py-3 border-b-2 font-semibold text-xs sm:text-sm transition duration-150 shrink-0 cursor-pointer ${
                  currentTab === 'dashboard'
                    ? 'border-indigo-600 text-indigo-650 dark:border-indigo-400 dark:text-indigo-400'
                    : 'border-transparent text-gray-500 hover:text-gray-700 dark:text-slate-400 dark:hover:text-slate-200'
                }`}
              >
                <Icons.Dashboard />
                <span>Bảng điều khiển phân tích</span>
              </button>

              <button
                id="tab-btn-tasks"
                onClick={() => setCurrentTab('tasks')}
                className={`flex items-center gap-2 px-5 py-3 border-b-2 font-semibold text-xs sm:text-sm transition duration-150 shrink-0 cursor-pointer ${
                  currentTab === 'tasks'
                    ? 'border-indigo-600 text-indigo-650 dark:border-indigo-400 dark:text-indigo-400'
                    : 'border-transparent text-gray-500 hover:text-gray-700 dark:text-slate-400 dark:hover:text-slate-200'
                }`}
              >
                <Icons.TaskList />
                <span>Mốc công việc triển khai thầu</span>
                <span className="bg-gray-100 dark:bg-slate-850 px-1.5 py-0.5 rounded-full text-[10px] font-bold text-gray-600 dark:text-slate-350">
                  {tasks.length}
                </span>
              </button>

              <button
                id="tab-btn-projects"
                onClick={() => setCurrentTab('projects')}
                className={`flex items-center gap-2 px-5 py-3 border-b-2 font-semibold text-xs sm:text-sm transition duration-150 shrink-0 cursor-pointer ${
                  currentTab === 'projects'
                    ? 'border-indigo-600 text-indigo-650 dark:border-indigo-400 dark:text-indigo-400'
                    : 'border-transparent text-gray-500 hover:text-gray-700 dark:text-slate-400 dark:hover:text-slate-200'
                }`}
              >
                <Icons.Project />
                <span>Quản lý gói thầu</span>
                <span className="bg-gray-100 dark:bg-slate-850 px-1.5 py-0.5 rounded-full text-[10px] font-bold text-gray-600 dark:text-slate-350">
                  {projects.length}
                </span>
              </button>
            </div>

            {/* TAB CONTENT: DASHBOARD */}
            {currentTab === 'dashboard' && (
              <Dashboard 
                projects={projects} 
                tasks={tasks} 
                onSelectProjectFilter={(projId) => setProjectFilter(projId)}
                onSelectTab={(tabName) => setCurrentTab(tabName)}
              />
            )}

            {/* TAB CONTENT: TASKS */}
            {currentTab === 'tasks' && (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
                
                {/* Left Form Panel */}
                <div className="lg:col-span-1 space-y-6">
                  <TaskForm 
                    projects={projects} 
                    onAddTask={handleAddTask} 
                    onAddProject={handleAddProject} 
                  />

                  {/* Quick Export excel info */}
                  <div className="bg-gradient-to-br from-emerald-950 to-slate-900 border border-emerald-900/30 p-5 rounded-2xl text-white">
                    <h4 className="text-sm font-bold text-emerald-400 flex items-center gap-2">
                      <Icons.FileDown />
                      <span>Trích xuất Dữ liệu Kế hoạch</span>
                    </h4>
                    <p className="text-xs text-slate-300 mt-1.5 leading-relaxed">
                      Xuất toàn bộ lịch sử đấu thầu, kết quả chấm kỹ thuật, tài chính, mốc hoàn thành và báo cáo hiệu suất của tất cả các gói thầu thầu ra định dạng bảng Excel chuyên nghiệp để làm việc ngoại tuyến.
                    </p>
                    <button
                      type="button"
                      id="sidebar-export-excel-btn"
                      onClick={() => exportTasksToCSV(projects, tasks)}
                      className="mt-4 w-full flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold py-2 px-3 rounded-xl transition duration-150 cursor-pointer active:translate-y-px"
                    >
                      <Icons.FileDown />
                      <span>Xuất File Báo Cáo excel</span>
                    </button>
                  </div>
                </div>

                {/* Right Tasks List & Filters Panel */}
                <div className="lg:col-span-2 space-y-4">
                  
                  {/* Real-time search and dropdown filters */}
                  <div className="bg-white dark:bg-slate-900 border border-gray-100 dark:border-slate-800 p-4 rounded-2xl shadow-xs transition-colors duration-200">
                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                      
                      {/* Search bar */}
                      <div className="relative sm:col-span-1">
                        <span className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                          <Icons.Search />
                        </span>
                        <input
                          type="text"
                          id="search-task-input"
                          placeholder="Tìm nội dung mốc thầu..."
                          value={searchQuery}
                          onChange={(e) => setSearchQuery(e.target.value)}
                          className="w-full pl-9 pr-3 py-2 rounded-lg border border-gray-200 dark:border-slate-800 text-xs sm:text-sm bg-white dark:bg-slate-950 text-gray-800 dark:text-slate-100 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"
                        />
                      </div>

                      {/* Dropdown Project thầu */}
                      <div className="sm:col-span-1">
                        <select
                          id="filter-project-select"
                          value={projectFilter}
                          onChange={(e) => setProjectFilter(e.target.value)}
                          className="w-full rounded-lg border border-gray-200 dark:border-slate-800 py-2 px-3 text-xs sm:text-sm bg-white dark:bg-slate-950 text-gray-800 dark:text-slate-100 focus:outline-none focus:border-indigo-550"
                        >
                          <option value="all" className="dark:bg-slate-950">-- Xem Tất cả gói thầu thầu --</option>
                          {projects.map(p => (
                            <option key={p.id} value={p.id} className="dark:bg-slate-950">{p.name}</option>
                          ))}
                        </select>
                      </div>

                      {/* Filter by status state tabs */}
                      <div className="flex bg-gray-55/70 dark:bg-slate-950 border border-gray-150/40 dark:border-slate-800/80 p-1 rounded-lg gap-1 sm:col-span-1">
                        <button
                          onClick={() => setStatusFilter('all')}
                          className={`flex-1 text-center py-1 rounded-md text-[11px] font-bold transition duration-150 cursor-pointer ${
                            statusFilter === 'all'
                              ? 'bg-indigo-600 text-white shadow-xs'
                              : 'text-gray-500 hover:text-gray-700 dark:text-slate-400 dark:hover:text-slate-200'
                          }`}
                        >
                          Tất cả
                        </button>
                        <button
                          onClick={() => setStatusFilter('pending')}
                          className={`flex-1 text-center py-1 rounded-md text-[11px] font-bold transition duration-150 cursor-pointer ${
                            statusFilter === 'pending'
                              ? 'bg-indigo-600 text-white shadow-xs'
                              : 'text-gray-500 hover:text-gray-700 dark:text-slate-400 dark:hover:text-slate-200'
                          }`}
                        >
                          Đang chạy
                        </button>
                        <button
                          onClick={() => setStatusFilter('completed')}
                          className={`flex-1 text-center py-1 rounded-md text-[11px] font-bold transition duration-150 cursor-pointer ${
                            statusFilter === 'completed'
                              ? 'bg-indigo-600 text-white shadow-xs'
                              : 'text-gray-500 hover:text-gray-700 dark:text-slate-400 dark:hover:text-slate-200'
                          }`}
                        >
                          Đã duyệt
                        </button>
                        <button
                          onClick={() => setStatusFilter('overdue')}
                          className={`flex-1 text-center py-1 rounded-md text-[11px] font-bold transition duration-150 cursor-pointer ${
                            statusFilter === 'overdue'
                              ? 'bg-rose-600 text-white shadow-xs'
                              : 'text-gray-500 hover:text-gray-700 dark:text-slate-405 dark:hover:text-slate-200'
                          }`}
                        >
                          Trễ hạn
                        </button>
                      </div>

                    </div>
                  </div>

                  {/* Tasks Cards List rendering */}
                  {filteredTasks.length === 0 ? (
                    <div className="bg-white dark:bg-slate-900 rounded-2xl border border-gray-100 dark:border-slate-800 p-12 text-center transition-colors duration-200">
                      <p className="text-gray-400 dark:text-slate-500 text-sm italic">
                        Không tìm thấy mốc công việc nào phù hợp với bộ lọc tìm kiếm hiện tại của bạn.
                      </p>
                    </div>
                  ) : (
                    <div className="space-y-4">
                      {filteredTasks.map((task) => {
                        const project = projects.find((p) => p.id === task.projectId);
                        const isOverdue = !task.isCompleted && new Date(task.planEndTime).getTime() < currentTimeTick;
                        const remaining = getRemainingTimeText(task.planEndTime);

                        const isEditingThis = editingTaskId === task.id;

                        return (
                          <div
                            key={task.id}
                            className={`bg-white dark:bg-slate-900 border rounded-2xl p-5 shadow-xs transition-all duration-200 ${
                              task.isCompleted
                                ? 'border-emerald-100/60 dark:border-emerald-950/20 bg-emerald-50/10 dark:bg-emerald-950/5'
                                : isOverdue
                                ? 'border-rose-200 dark:border-rose-950/30 bg-rose-50/5 dark:bg-rose-950/5'
                                : 'border-gray-100 dark:border-slate-800 hover:border-gray-200 dark:hover:border-slate-700'
                            }`}
                          >
                            {isEditingThis ? (
                              /* Inline Editing Mode Block */
                              <div className="space-y-3">
                                <div className="flex items-center justify-between border-b border-gray-100 dark:border-slate-800 pb-2">
                                  <span className="text-xs font-bold text-indigo-650 dark:text-indigo-400 uppercase tracking-wider">Chỉnh sửa mốc thầu</span>
                                  <button onClick={() => setEditingTaskId(null)} className="text-gray-400 hover:text-gray-600 text-xs cursor-pointer">Hủy</button>
                                </div>
                                <div>
                                  <label className="block text-[11px] font-bold text-gray-500 uppercase mb-1">Gói thầu / Dự án thầu</label>
                                  <select
                                    value={editProjectId}
                                    onChange={(e) => setEditProjectId(e.target.value)}
                                    className="w-full text-xs rounded-md border border-gray-200 dark:border-slate-800 p-2 bg-white dark:bg-slate-950 text-gray-800 dark:text-slate-100 focus:outline-none focus:border-indigo-500"
                                  >
                                    {projects.map(p => (
                                      <option key={p.id} value={p.id}>{p.name}</option>
                                    ))}
                                  </select>
                                </div>
                                <div>
                                  <label className="block text-[11px] font-bold text-gray-500 uppercase mb-1">Nội dung thực hiện</label>
                                  <textarea
                                    rows={2}
                                    value={editContent}
                                    onChange={(e) => setEditContent(e.target.value)}
                                    className="w-full text-xs rounded-md border border-gray-200 dark:border-slate-800 p-2 bg-white dark:bg-slate-950 text-gray-800 dark:text-slate-100 focus:outline-none focus:border-indigo-500"
                                  />
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                  <div>
                                    <label className="block text-[11px] font-bold text-gray-500 uppercase mb-1">Thời gian bắt đầu</label>
                                    <input
                                      type="datetime-local"
                                      value={editStartTime}
                                      onChange={(e) => setEditStartTime(e.target.value)}
                                      className="w-full text-xs rounded-md border border-gray-200 dark:border-slate-800 p-2 bg-white dark:bg-slate-950 text-gray-700 dark:text-slate-200"
                                    />
                                  </div>
                                  <div>
                                    <label className="block text-[11px] font-bold text-gray-500 uppercase mb-1">Thời hạn kế hoạch</label>
                                    <input
                                      type="datetime-local"
                                      value={editPlanEndTime}
                                      onChange={(e) => setEditPlanEndTime(e.target.value)}
                                      className="w-full text-xs rounded-md border border-gray-200 dark:border-slate-800 p-2 bg-white dark:bg-slate-950 text-gray-700 dark:text-slate-200"
                                    />
                                  </div>
                                </div>
                                <div className="flex justify-end gap-2 pt-2">
                                  <button
                                    onClick={() => setEditingTaskId(null)}
                                    className="px-3 py-1.5 text-xs text-gray-500 bg-gray-100 dark:bg-slate-800 hover:bg-gray-200 rounded-md cursor-pointer"
                                  >
                                    Hủy bỏ
                                  </button>
                                  <button
                                    onClick={() => handleSaveTaskEdit(task.id)}
                                    className="px-3 py-1.5 text-xs text-white bg-indigo-650 hover:bg-indigo-700 rounded-md cursor-pointer font-semibold"
                                  >
                                    Lưu chỉnh sửa
                                  </button>
                                </div>
                              </div>
                            ) : (
                              /* Standard View Block */
                              <div className="space-y-3.5">
                                <div className="flex items-start justify-between gap-4">
                                  <div className="space-y-1">
                                    <span className="text-[10px] font-extrabold text-indigo-650 dark:text-indigo-400 bg-indigo-50 dark:bg-indigo-950/30 px-2 py-0.5 rounded-md border border-indigo-100/40 dark:border-indigo-900/30 inline-block max-w-[320px] sm:max-w-md truncate" title={project ? project.name : 'Chưa định nghĩa Gói thầu'}>
                                      {project ? project.name : 'Không xác định Gói thầu'}
                                    </span>
                                    <h4 className={`text-sm sm:text-base font-bold leading-relaxed ${
                                      task.isCompleted ? 'line-through text-gray-400 dark:text-slate-500' : 'text-gray-850 dark:text-slate-100'
                                    }`}>
                                      {task.content}
                                    </h4>
                                  </div>

                                  {/* Custom Checkbox as Status Button */}
                                  <button
                                    type="button"
                                    id={`toggle-complete-btn-${task.id}`}
                                    onClick={() => handleToggleTaskStatus(task.id)}
                                    className={`shrink-0 flex items-center justify-center w-6 h-6 rounded-lg border-2 transition-all duration-150 cursor-pointer ${
                                      task.isCompleted
                                        ? 'border-emerald-500 bg-emerald-500 text-white'
                                        : isOverdue
                                        ? 'border-rose-405 dark:border-rose-600 bg-rose-50 dark:bg-rose-950/40 text-rose-600'
                                        : 'border-gray-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-transparent hover:border-indigo-500 hover:bg-indigo-50/10'
                                    }`}
                                    title={task.isCompleted ? "Đánh dấu Chưa hoàn thành" : "Hoàn thành & Đánh giá hiệu suất thầu"}
                                  >
                                    <Icons.Check />
                                  </button>
                                </div>

                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 text-xs text-gray-500 dark:text-slate-400 border-t border-gray-50 dark:border-slate-800/60 pt-3">
                                  <div className="space-y-1 font-medium">
                                    <p className="flex items-center gap-1.5 text-gray-450 dark:text-slate-400">
                                      <span className="text-gray-400"><Icons.Clock /></span>
                                      <span>Bắt đầu: {formatReadableDateTime(task.startTime)}</span>
                                    </p>
                                    <p className="flex items-center gap-1.5">
                                      <span className="text-gray-400"><Icons.Clock /></span>
                                      <span>Hạn chót: <strong className="text-gray-700 dark:text-slate-300">{formatReadableDateTime(task.planEndTime)}</strong></span>
                                    </p>
                                  </div>

                                  <div className="flex flex-wrap items-center justify-start sm:justify-end gap-2.5">
                                    {task.isCompleted ? (
                                      <div className="space-y-1 text-left sm:text-right w-full sm:w-auto">
                                        <p className="text-[11px] font-bold text-emerald-600 bg-emerald-50 dark:bg-emerald-950/30 border border-emerald-100/55 dark:border-emerald-900/30 rounded-md px-2 py-0.5 inline-block">
                                          ✓ Đã xong: {formatReadableDateTime(task.completedAt)}
                                        </p>
                                        <p className="text-[10px] text-gray-450 dark:text-slate-500 font-bold uppercase tracking-wider">
                                          Đánh giá: {' '}
                                          <span className={task.evaluation === 'Dat' ? 'text-emerald-500' : 'text-rose-500'}>
                                            {task.evaluation === 'Dat' ? 'ĐẠT KỸ THUẬT' : 'CHƯA ĐẠT KỸ THUẬT'}
                                          </span>
                                        </p>
                                      </div>
                                    ) : (
                                      <span className={`inline-flex items-center gap-1 text-[11px] font-bold py-1 px-2.5 rounded-lg border ${
                                        isOverdue
                                          ? 'bg-rose-50 dark:bg-rose-955/20 border-rose-100 dark:border-rose-950/40 text-rose-700 animate-pulse'
                                          : 'bg-indigo-50 dark:bg-indigo-955/20 border-indigo-100 dark:border-indigo-900/40 text-indigo-700'
                                      }`}>
                                        <Icons.Clock />
                                        <span>{remaining.text}</span>
                                      </span>
                                    )}
                                  </div>
                                </div>

                                {/* Remarks & Lessons learned section */}
                                {task.isCompleted && task.remarks && (
                                  <div className="bg-slate-50/50 dark:bg-slate-950/40 p-3 rounded-xl border border-gray-100/60 dark:border-slate-800 text-xs">
                                    <strong className="text-[10px] font-bold uppercase tracking-wider text-indigo-600 dark:text-indigo-400 block mb-1">
                                      Ghi chú / Kinh nghiệm:
                                    </strong>
                                    <p className="text-gray-650 dark:text-slate-350 italic whitespace-pre-wrap leading-relaxed">
                                      "{task.remarks}"
                                    </p>
                                  </div>
                                )}

                                {/* Action Buttons Panel (Edit, Delete) */}
                                <div className="flex justify-end items-center gap-2 border-t border-gray-50 dark:border-slate-800/30 pt-2.5">
                                  <button
                                    type="button"
                                    id={`edit-task-btn-${task.id}`}
                                    onClick={() => startEditTask(task)}
                                    className="flex items-center gap-1 px-2.5 py-1.5 text-[11px] font-semibold text-gray-500 dark:text-slate-400 hover:text-indigo-650 dark:hover:text-indigo-400 rounded-lg hover:bg-gray-50 dark:hover:bg-slate-850 border border-transparent hover:border-gray-100 dark:hover:border-slate-800 transition duration-150 cursor-pointer"
                                    title="Chỉnh sửa chi tiết công việc"
                                  >
                                    <Icons.Edit />
                                    <span>Sửa</span>
                                  </button>
                                  <button
                                    type="button"
                                    id={`delete-task-btn-${task.id}`}
                                    onClick={() => handleDeleteTask(task.id)}
                                    className="flex items-center gap-1 px-2.5 py-1.5 text-[11px] font-semibold text-gray-500 dark:text-slate-400 hover:text-rose-600 dark:hover:text-rose-400 rounded-lg hover:bg-rose-50/20 dark:hover:bg-rose-950/10 border border-transparent hover:border-rose-100/40 dark:hover:border-rose-900/20 transition duration-150 cursor-pointer"
                                    title="Xóa công việc"
                                  >
                                    <Icons.Trash />
                                    <span>Xóa</span>
                                  </button>
                                </div>

                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  )}

                </div>

              </div>
            )}

            {/* TAB CONTENT: PROJECTS MANAGER */}
            {currentTab === 'projects' && (
              <div className="space-y-6">
                
                {/* Header Info */}
                <div className="bg-white dark:bg-slate-900 border border-gray-100 dark:border-slate-800 p-5 rounded-2xl shadow-xs transition-colors duration-200">
                  <h2 className="text-lg font-bold text-gray-900 dark:text-white flex items-center gap-2">
                    <span className="text-indigo-600 dark:text-indigo-450">
                      <Icons.Project />
                    </span>
                    <span>Quản Lý Dự Án & Danh Mục Gói Thầu</span>
                  </h2>
                  <p className="text-xs text-gray-500 dark:text-slate-400 mt-1">
                    Thêm thắt, sắp đặt hoặc giải tán các gói thầu thầu đang theo dõi. Lưu ý: Xóa gói thầu thầu sẽ xóa sạch mọi tiến trình mốc công việc phụ thuộc.
                  </p>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
                  
                  {/* Left Column: Create Project Form */}
                  <div className="lg:col-span-1 bg-white dark:bg-slate-900 rounded-2xl border border-gray-100 dark:border-slate-800 p-6 shadow-sm transition-colors duration-200">
                    <h3 className="font-bold text-gray-800 dark:text-white text-base mb-4 flex items-center gap-2">
                      <Icons.FolderPlus />
                      <span>Thêm Gói Thầu Mới</span>
                    </h3>
                    <form onSubmit={handleAddProjectDirect} className="space-y-4">
                      <div>
                        <label className="block text-xs font-semibold text-gray-500 dark:text-slate-400 uppercase tracking-wider mb-1.5">
                          Tên Gói thầu / Dự án thầu <span className="text-red-500">*</span>
                        </label>
                        <input
                          type="text"
                          id="direct-project-name"
                          placeholder="Nhập tên gói thầu (Ví dụ: Gói thầu Thiết bị thầu...)"
                          className="w-full rounded-lg border border-gray-200 dark:border-slate-800 px-3 py-2 text-sm bg-white dark:bg-slate-950 text-gray-800 dark:text-slate-100 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"
                          required
                        />
                      </div>
                      <button
                        type="submit"
                        id="direct-project-submit"
                        className="w-full bg-indigo-600 hover:bg-indigo-705 text-white font-bold text-xs py-2.5 rounded-xl transition duration-150 flex items-center justify-center gap-1.5 cursor-pointer active:translate-y-px"
                      >
                        <Icons.Add />
                        <span>Tạo Gói thầu mới</span>
                      </button>
                    </form>
                  </div>

                  {/* Right Column: Projects List */}
                  <div className="lg:col-span-2 bg-white dark:bg-slate-900 border border-gray-100 dark:border-slate-800 rounded-2xl p-6 shadow-sm transition-colors duration-200">
                    <h3 className="font-bold text-gray-800 dark:text-white text-base mb-4 flex items-center gap-2 border-b border-gray-50 dark:border-slate-805 pb-3">
                      <Icons.Project />
                      <span>Danh Sách Dự Án Đang Chạy ({projects.length})</span>
                    </h3>

                    {projects.length === 0 ? (
                      <p className="text-center py-8 text-gray-400 dark:text-slate-500 text-sm italic">
                        Chưa có gói thầu nào được thiết lập. Hãy tạo dự án thầu đầu tiên để phân công công việc.
                      </p>
                    ) : (
                      <div className="divide-y divide-gray-100 dark:divide-slate-800">
                        {projects.map((p) => {
                          const projTasks = tasks.filter((t) => t.projectId === p.id);
                          const active = projTasks.filter((t) => !t.isCompleted).length;
                          const completed = projTasks.filter((t) => t.isCompleted).length;

                          return (
                            <div key={p.id} className="py-4 flex flex-col sm:flex-row sm:items-center justify-between gap-4 first:pt-0 last:pb-0">
                              <div className="space-y-1.5">
                                <h4 className="text-sm sm:text-base font-bold text-gray-900 dark:text-slate-100">
                                  {p.name}
                                </h4>
                                <div className="flex flex-wrap gap-2 text-xs font-medium">
                                  <span className="text-gray-400 font-mono">
                                    Khởi tạo: {new Date(p.createdAt).toLocaleDateString('vi-VN')}
                                  </span>
                                  <span className="text-indigo-600 dark:text-indigo-400 font-semibold bg-indigo-50 dark:bg-indigo-950/30 px-2 py-0.5 rounded border border-indigo-100/30">
                                    {projTasks.length} mốc thầu
                                  </span>
                                  <span className="text-emerald-600 dark:text-emerald-400 font-semibold bg-emerald-50 dark:bg-emerald-950/30 px-2 py-0.5 rounded border border-emerald-100/30">
                                    Đã xong: {completed}
                                  </span>
                                  {active > 0 && (
                                    <span className="text-sky-600 dark:text-sky-400 font-semibold bg-sky-50 dark:bg-sky-950/30 px-2 py-0.5 rounded border border-sky-100/30">
                                      Đang làm: {active}
                                    </span>
                                  )}
                                </div>
                              </div>

                              <button
                                type="button"
                                id={`delete-proj-btn-${p.id}`}
                                onClick={() => handleDeleteProject(p.id)}
                                className="sm:self-center self-start flex items-center justify-center gap-1.5 px-3 py-2 text-xs font-bold text-rose-600 hover:text-white hover:bg-rose-600 border border-rose-250 dark:border-rose-950/50 rounded-lg transition duration-150 cursor-pointer shrink-0"
                                title="Xóa gói thầu thầu và toàn bộ công việc đi kèm"
                              >
                                <Icons.Trash />
                                <span>Xóa gói thầu</span>
                              </button>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>

                </div>

              </div>
            )}

            {/* Footer rights block */}
            <footer className="text-center text-gray-400 dark:text-slate-500 text-xs mt-12 border-t border-gray-100 dark:border-slate-900 pt-5 font-mono">
              <p>© 2026 Tender KPI Tracker Core Engine. Hệ thống Quản trị Tiến độ Offline-first.</p>
              <p className="mt-1">Dữ liệu được lưu an toàn trên trình duyệt cục bộ của bạn.</p>
            </footer>

            {/* Task Evaluation Modal Overlay */}
            <TaskEvaluationModal
              isOpen={evalModalOpen}
              taskContent={taskToEval ? taskToEval.content : ''}
              onClose={() => {
                setEvalModalOpen(false);
                setTaskToEval(null);
              }}
              onSubmit={handleSaveTaskEvaluation}
            />

          </div>
        );
      }

      // ==========================================
      // ROOT INJECTION
      // ==========================================
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
