      function formatDateTimeLocal(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        return `${year}-${month}-${day}T${hours}:${minutes}`;
      }

      function formatReadableDateTime(isoString) {
        if (!isoString) return '';
        const date = new Date(isoString);
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const year = date.getFullYear();
        return `${hours}:${minutes} ngày ${day}/${month}/${year}`;
      }

      function getRemainingTimeText(planEndTimeStr) {
        const diff = new Date(planEndTimeStr).getTime() - Date.now();

        if (diff <= 0) {
          return { text: 'TRỄ HẸN', isOverdue: true };
        }

        const minutesTotal = Math.floor(diff / (60 * 1000));
        const hoursTotal = Math.floor(diff / (60 * 60 * 1000));
        const days = Math.floor(diff / (24 * 60 * 60 * 1000));

        if (days > 0) {
          const remainingHours = hoursTotal % 24;
          return {
            text: `Còn ${days} ngày${remainingHours > 0 ? ` ${remainingHours} giờ` : ''}`,
            isOverdue: false,
          };
        }

        if (hoursTotal > 0) {
          const remainingMinutes = minutesTotal % 60;
          return {
            text: `Còn ${hoursTotal} giờ${remainingMinutes > 0 ? ` ${remainingMinutes} phút` : ''}`,
            isOverdue: false,
          };
        }

        return {
          text: `Còn ${minutesTotal > 0 ? minutesTotal : 1} phút`,
          isOverdue: false,
        };
      }

      function exportTasksToCSV(projects, tasks) {
        const headers = [
          'Mã công việc',
          'Tên Dự án/Gói thầu',
          'Nội dung công việc',
          'Thời gian bắt đầu',
          'Hạn chót kế hoạch',
          'Trạng thái',
          'Thời gian thực tế hoàn thành',
          'Kết quả đánh giá',
          'Nhận xét / Bài học rút ra'
        ];

        const rows = tasks.map(task => {
          const project = projects.find(p => p.id === task.projectId);
          const projectName = project ? project.name : 'Không xác định';

          let statusText = 'Đang thực hiện';
          if (task.isCompleted) {
            statusText = 'Đã hoàn thành';
          } else {
            const isOverdue = new Date(task.planEndTime).getTime() < Date.now();
            if (isOverdue) {
              statusText = 'Trễ hạn';
            }
          }

          const evalText = task.isCompleted
            ? (task.evaluation === 'Dat' ? 'Đạt yêu cầu' : 'Không đạt')
            : 'Chưa đánh giá';

          return [
            task.id,
            projectName,
            task.content,
            formatReadableDateTime(task.startTime),
            formatReadableDateTime(task.planEndTime),
            statusText,
            task.completedAt ? formatReadableDateTime(task.completedAt) : '',
            evalText,
            task.remarks || ''
          ];
        });

        const csvContent = [
          headers.map(h => `"${h.replace(/"/g, '""')}"`).join(','),
          ...rows.map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))
        ].join('\r\n');

        const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], {
          type: 'text/csv;charset=utf-8;'
        });

        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        
        const date = new Date();
        const day = String(date.getDate()).padStart(2, '0');
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const year = date.getFullYear();
        const dateStr = `${day}-${month}-${year}`;
        
        link.href = url;
        link.setAttribute('download', `Bao_Cao_Theo_Doi_Va_Hieu_Suat_KPI_${dateStr}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      }

          if (!startTime) {
            setFormError('Vui lòng chọn thời gian bắt đầu!');
            return;
          }
          if (!planEndTime) {
            setFormError('Vui lòng chọn kế hoạch hoàn thành!');
            return;
          }

          const startMs = new Date(startTime).getTime();
          const endMs = new Date(planEndTime).getTime();

          if (endMs <= startMs) {
            setFormError('Kế hoạch hoàn thành phải sau Thời gian bắt đầu!');
            return;
          }

          onAddTask({
            projectId: selectedProjectId,
            content: content.trim(),
            startTime,
            planEndTime,
          });

          setContent('');
          setStartTime(formatDateTimeLocal(new Date()));
          const nextDay = new Date();
          nextDay.setDate(nextDay.getDate() + 1);
          setPlanEndTime(formatDateTimeLocal(nextDay));

          setSuccessMsg('Đã thêm công việc mới thành công!');
          setTimeout(() => {
            setSuccessMsg('');

      // =========================================================
      // 6. MAIN COMPONENT: DASHBOARD OVERVIEW & ANALYTICS
      // =========================================================
      function Dashboard({ projects, tasks, onResetData }) {
        const nowMs = Date.now();

        const totalProjects = projects.length;
        
        const activeProjectsCount = projects.filter(p => {
          const projTasks = tasks.filter(t => t.projectId === p.id);
          return projTasks.some(t => !t.isCompleted);
        }).length;

        const totalTasksCreated = tasks.length;
        const completedTasks = tasks.filter(t => t.isCompleted);
        const completedTasksCount = completedTasks.length;

        const overdueTasksCount = tasks.filter(
          t => !t.isCompleted && new Date(t.planEndTime).getTime() < nowMs
        ).length;

        const completedOnTime = completedTasks.filter(t => {
          const completedTime = new Date(t.completedAt).getTime();
          const planEndTime = new Date(t.planEndTime).getTime();
          return completedTime <= planEndTime;
        });
        const completedOnTimeCount = completedOnTime.length;

        const kpiRate = completedTasksCount > 0 
          ? Math.round((completedOnTimeCount / completedTasksCount) * 100) 
          : 0;

        const projectStats = projects.map(proj => {
          const projTasks = tasks.filter(t => t.projectId === proj.id);
          const activeCount = projTasks.filter(t => !t.isCompleted).length;
          const completedCount = projTasks.filter(t => t.isCompleted).length;
          
          const passedTasks = projTasks.filter(t => t.isCompleted && t.evaluation === 'Dat');
          const passRate = completedCount > 0 
            ? Math.round((passedTasks.length / completedCount) * 100) 
            : 0;

          const remarksList = projTasks
            .filter(t => t.isCompleted && t.remarks && t.remarks.trim() !== '')
            .map(t => ({
              taskId: t.id,
              content: t.content,
              evaluation: t.evaluation,
              remarks: t.remarks || '',
              completedAt: t.completedAt || '',
            }));

          return {
            ...proj,
            activeCount,
            completedCount,
            passRate,
            remarksList,
            allTasks: projTasks,
          };
        });

        return (
          <div className="space-y-6">
            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 bg-white dark:bg-slate-900 border border-gray-100 dark:border-slate-800 p-5 rounded-2xl shadow-sm transition-all duration-200">
              <div>
                <h2 className="text-lg font-bold text-gray-900 dark:text-white flex items-center gap-2">
                  <Icon name="TrendingUp" className="w-5 h-5 text-indigo-600 dark:text-indigo-400" />
                  Đo Lường Hiệu Suất KPI & Đấu Thầu
                </h2>
                <p className="text-xs text-gray-500 dark:text-slate-400 mt-1">
                  Đánh giá tỷ lệ hoàn thành đúng tiến độ nội bộ, thống kê tỷ lệ đạt kiểm tra của các phòng ban.
                </p>
              </div>
              
              <div className="flex items-center gap-2.5 shrink-0">
                <button
                  type="button"
                  id="dashboard-export-excel-btn"
                  onClick={() => exportTasksToCSV(projects, tasks)}
                  className="flex items-center justify-center gap-1.5 px-4 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold rounded-xl shadow-sm hover:shadow-md transition-all duration-150 cursor-pointer active:translate-y-0.5"
                  title="Xuất bảng dữ liệu ra file Excel (.csv)"
                >
                  <Icon name="FileDown" className="w-4 h-4" />
                  <span>Xuất Báo Cáo Excel</span>
                </button>
                <button
                  type="button"
                  id="dashboard-reset-btn"
                  onClick={onResetData}
                  className="flex items-center justify-center gap-1.5 px-3.5 py-2.5 bg-gray-100 dark:bg-slate-800 hover:bg-gray-200 dark:hover:bg-slate-700 text-gray-600 dark:text-slate-300 text-xs font-bold rounded-xl shadow-sm transition-all duration-150 cursor-pointer"
                  title="Khôi phục lại dữ liệu mẫu"
                >
                  <Icon name="RefreshCw" className="w-4 h-4" />
                  <span className="hidden sm:inline">Khôi phục gốc</span>
                </button>
              </div>
            </div>

            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
              <div className="bg-white dark:bg-slate-900 rounded-2xl border border-gray-100 dark:border-slate-800 p-5 shadow-xs flex items-center gap-4 transition-all duration-200">
                <div className="p-3.5 bg-indigo-50 dark:bg-indigo-950/40 text-indigo-600 dark:text-indigo-400 rounded-xl">
                  <Icon name="Folder" className="w-6 h-6" />
                </div>
                <div>
                  <p className="text-xs font-bold text-gray-400 dark:text-slate-500 uppercase tracking-wider">Tổng Dự Án</p>

                <div>
                  <p className="text-xs font-bold text-gray-400 dark:text-slate-500 uppercase tracking-wider">Đã Giao Thầu</p>

                <div className="p-3.5 bg-emerald-50 dark:bg-emerald-950/40 text-emerald-600 dark:text-emerald-400 rounded-xl">

                <div>

                  <p className="text-xs text-gray-500 dark:text-slate-400 mt-1">
                    Đúng hạn: <span className="font-semibold text-emerald-600 dark:text-emerald-400">{completedOnTimeCount}</span> / {completedTasksCount}
                  </p>
                </div>
              </div>

              <div className="bg-white dark:bg-slate-900 rounded-2xl border border-gray-100 dark:border-slate-800 p-5 shadow-xs flex items-center gap-4 transition-all duration-200">
                <div className="p-3.5 bg-rose-50 dark:bg-rose-950/40 text-rose-600 dark:text-rose-400 rounded-xl">
                  <Icon name="AlertTriangle" className="w-6 h-6" />
                </div>
                <div>
                  <p className="text-xs font-bold text-gray-400 dark:text-slate-500 uppercase tracking-wider">Đang Trễ Hạn</p>
                  <h4 className={`text-2xl font-extrabold mt-0.5 ${overdueTasksCount > 0 ? 'text-rose-600 animate-pulse' : 'text-gray-800 dark:text-white'}`}>
                    {overdueTasksCount}
                  </h4>
                  <p className="text-xs text-gray-500 dark:text-slate-400 mt-1">
                    Cần giải quyết gấp!
                  </p>
                </div>
              </div>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
              <div className="bg-gradient-to-br from-indigo-950 to-slate-900 rounded-3xl p-6 text-white shadow-lg md:col-span-1 flex flex-col justify-between relative overflow-hidden">
                <div className="absolute right-0 bottom-0 opacity-5 pointer-events-none">
                  <Icon name="TrendingUp" className="w-48 h-48" />
                </div>

                <div>
                  <div className="flex items-center justify-between mb-4">

                    <Icon name="CalendarCheck2" className="w-5 h-5 text-indigo-400" />
                  </div>
                  <h3 className="text-lg font-bold text-white leading-tight">KPI Hoàn Thành Đúng Hạn</h3>
                  <p className="text-xs text-indigo-300 mt-1">Đo lường tính kỷ luật tiến độ nội bộ</p>
                </div>

                <div className="my-6 flex items-center justify-center">
                  <div className="relative w-32 h-32">
                    <svg className="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                      <circle cx="18" cy="18" r="16" fill="none" stroke="#1e293b" strokeWidth="3" />
                      <circle 
                        cx="18" 
                        cy="18" 
                        r="16" 
                        fill="none" 
                        stroke="#6366f1" 
                        strokeWidth="3.2" 
                        strokeDasharray={`${kpiRate}, 100`}
                        strokeLinecap="round"
                        className="transition-all duration-1000 ease-out"
                      />
                    </svg>
                    <div className="absolute inset-0 flex flex-col items-center justify-center">
                      <span className="text-2xl font-black text-white">{kpiRate}%</span>
                      <span className="text-[9px] font-bold text-indigo-200 mt-0.5 tracking-wider uppercase">ĐÚNG HẠN</span>
                    </div>
                  </div>
                </div>

                <div className="space-y-2 text-xs border-t border-slate-800 pt-4">
                  <div className="flex items-center justify-between text-slate-300">
                    <span className="flex items-center gap-1.5">
                      <span className="w-2.5 h-2.5 bg-indigo-500 rounded-full"></span>
                      Xong đúng hạn:
                    </span>
                    <strong className="text-white">{completedOnTimeCount} việc</strong>
                  </div>
                  <div className="flex items-center justify-between text-slate-300">
                    <span className="flex items-center gap-1.5">
                      <span className="w-2.5 h-2.5 bg-slate-700 rounded-full"></span>
                      Tổng số hoàn thành:
                    </span>
                    <strong className="text-white">{completedTasksCount} việc</strong>
                  </div>
                </div>

                <div className="mt-4 text-xs text-indigo-300 bg-indigo-900/20 p-3 rounded-xl border border-indigo-900/30">
                  {kpiRate >= 80 
                    ? 'Xuất sắc! Đội ngũ đang phối hợp triển khai vô cùng chuyên nghiệp.' 
                    : kpiRate >= 50 
                    ? 'Khá tốt! Hãy chú ý kiểm tra sát sao hơn các hạng mục chuẩn bị trễ hạn.' 
                    : completedTasksCount === 0 
                    ? 'Chưa có dữ liệu hoàn thành nào để xếp hạng chỉ số KPI.' 
                    : 'Cảnh báo! Chỉ số đúng hạn ở mức thấp, cần rà soát lại nhân lực & quy trình thầu.'}
                </div>
              </div>

              <div className="bg-white dark:bg-slate-900 rounded-3xl border border-gray-150 dark:border-slate-800 p-6 shadow-sm md:col-span-2 transition-all duration-200">
                <div className="flex items-center justify-between mb-4 border-b border-gray-100 dark:border-slate-850 pb-3">
                  <div className="flex items-center gap-2">
                    <Icon name="FileCheck2" className="w-5 h-5 text-indigo-600 dark:text-indigo-400" />
                    <h3 className="font-bold text-gray-800 dark:text-white">Chi Tiết Hiệu Suất KPI Theo Dự Án</h3>
                  </div>
                  <span className="text-xs font-bold text-gray-400 dark:text-slate-500 uppercase tracking-wider">Tỷ lệ đạt chuẩn</span>
                </div>

                <div className="space-y-4 max-h-[460px] overflow-y-auto pr-1">
                  {projectStats.map(p => {
                    const totalProjTasks = p.activeCount + p.completedCount;
                    return (
                      <div key={p.id} className="bg-slate-50/50 dark:bg-slate-950/40 rounded-2xl p-4 border border-gray-100 dark:border-slate-800/80 space-y-3">
                        <div className="flex items-start justify-between gap-4">
                          <span className="font-bold text-sm text-gray-800 dark:text-slate-200 leading-tight">
                            {p.name}
                          </span>
                          <span className="text-xs font-bold text-indigo-600 dark:text-indigo-400 bg-indigo-50 dark:bg-indigo-950/40 px-2.5 py-1 rounded-lg shrink-0 border border-indigo-100/40 dark:border-indigo-900/20">
                            Chất lượng Đạt: {p.passRate}%
                          </span>
                        </div>
                        
                        <div className="h-2 w-full bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
                          <div 
                            className={`h-full rounded-full transition-all duration-500 ${
                              p.passRate >= 80 
                                ? 'bg-emerald-500' 
                                : p.passRate >= 50 
                                ? 'bg-indigo-500' 
                                : 'bg-rose-500'
                            }`}
                            style={{ width: `${p.passRate}%` }}
                          ></div>
                        </div>

                        <div className="flex justify-between items-center text-[11px] text-gray-400 dark:text-slate-500">
                          <span>
                            Trạng thái: <strong className="text-sky-600 dark:text-sky-400">{p.activeCount} việc đang chạy</strong> / <strong className="text-emerald-600 dark:text-emerald-400">{p.completedCount} đã xong</strong>
                          </span>
                          <span>Tổng: {totalProjTasks} hạng mục</span>
                        </div>

                        {p.remarksList.length > 0 && (
                          <div className="mt-3 bg-white dark:bg-slate-900 p-3 rounded-xl border border-gray-100 dark:border-slate-850 space-y-1.5">
                            <span className="text-[10px] font-bold text-gray-400 dark:text-slate-500 uppercase tracking-wider block">Bài học kinh nghiệm / Nhật ký khắc phục:</span>
                            <div className="space-y-1.5 max-h-32 overflow-y-auto pr-1">
                              {p.remarksList.map((item, idx) => (
                                <div key={idx} className="text-xs border-l-2 border-indigo-500 dark:border-indigo-400 pl-2 py-0.5 space-y-0.5">
                                  <div className="flex items-center gap-1 text-[10px] text-gray-400 dark:text-slate-500 font-medium">
                                    <span>Giao thầu: "{item.content.substring(0, 50)}..."</span>
                                    <span>•</span>
                                    <span className={item.evaluation === 'Dat' ? 'text-emerald-600 font-bold' : 'text-rose-600 font-bold'}>
                                      {item.evaluation === 'Dat' ? 'Đạt' : 'Chưa đạt'}
                                    </span>
                                  </div>
                                  <p className="text-gray-600 dark:text-slate-300 italic font-medium">
                                    "{item.remarks}"
                                  </p>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          </div>
        );
      }

      // =========================================================
      // 7. MAIN APP WRAPPER (State management & Views router)
      // =========================================================
      function App() {
        const [projects, setProjects] = useState([]);
        const [tasks, setTasks] = useState([]);
        
        const [isDarkMode, setIsDarkMode] = useState(() => {
          const stored = safeStorage.getItem('pms_dark_mode');
          return stored === 'true';
        });

        useEffect(() => {
          if (isDarkMode) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
          safeStorage.setItem('pms_dark_mode', String(isDarkMode));
        }, [isDarkMode]);
        
        const [currentTab, setCurrentTab] = useState('dashboard');
        
        // Task Filtering/Search States
        const [selectedFilterProjectId, setSelectedFilterProjectId] = useState('all');
        const [statusFilter, setStatusFilter] = useState('all');
        const [searchQuery, setSearchQuery] = useState('');

        // Loading and Initialization
        useEffect(() => {
          const storedProjects = safeStorage.getItem('pms_projects');
          const storedTasks = safeStorage.getItem('pms_tasks');

          if (storedProjects && storedTasks) {
            try {
              setProjects(JSON.parse(storedProjects));
              setTasks(JSON.parse(storedTasks));
            } catch (e) {
              console.error("Error parsing stored data", e);
              loadDefaultMockData();
            }
          } else {
            loadDefaultMockData();
          }
        }, []);

        const loadDefaultMockData = () => {
          const mockProj = getMockProjects();
          const mockTasks = getMockTasks();
          setProjects(mockProj);
          setTasks(mockTasks);
          safeStorage.setItem('pms_projects', JSON.stringify(mockProj));
          safeStorage.setItem('pms_tasks', JSON.stringify(mockTasks));
        };

        const saveProjects = (updatedProjects) => {
          setProjects(updatedProjects);
          safeStorage.setItem('pms_projects', JSON.stringify(updatedProjects));
        };

        const saveTasks = (updatedTasks) => {
          setTasks(updatedTasks);
          safeStorage.setItem('pms_tasks', JSON.stringify(updatedTasks));
        };

        const handleAddProject = (projectName) => {
          const newProject = {
            id: `proj-${Date.now()}`,
            name: projectName,
            createdAt: new Date().toISOString(),
          };
          const updated = [newProject, ...projects];
          saveProjects(updated);
          return newProject.id;
        };

        const handleAddTask = (taskData) => {
          const newTask = {
            id: `task-${Date.now()}`,
            projectId: taskData.projectId,
            content: taskData.content,
            startTime: new Date(taskData.startTime).toISOString(),
            planEndTime: new Date(taskData.planEndTime).toISOString(),
            isCompleted: false,
          };
          const updated = [newTask, ...tasks];
          saveTasks(updated);
        };

        // Complete & Evaluation Modal triggers
        const [evaluatingTask, setEvaluatingTask] = useState(null);

        const handleCompleteClick = (task) => {
          setEvaluatingTask(task);
        };

        const handleEvaluationSubmit = (evaluation, remarks) => {
          if (!evaluatingTask) return;

          const updatedTasks = tasks.map((t) => {
            if (t.id === evaluatingTask.id) {
              return {
                ...t,
                isCompleted: true,
                completedAt: new Date().toISOString(),
                evaluation,
                remarks,
              };
            }
            return t;
          });

          saveTasks(updatedTasks);
          setEvaluatingTask(null);
        };

        const handleDeleteTask = (taskId) => {
          if (window.confirm('Bạn có chắc chắn muốn xóa công việc này không? Dữ liệu đã xóa không thể phục hồi.')) {
            const updated = tasks.filter((t) => t.id !== taskId);
            saveTasks(updated);
          }
        };

        const handleResetData = () => {
          if (window.confirm('Hành động này sẽ khôi phục lại dữ liệu mẫu gốc ban đầu. Các dự án và hạng mục tự thêm của bạn sẽ bị ghi đè. Bạn có muốn tiếp tục không?')) {
            loadDefaultMockData();
          }
        };

        // Real-time ticking remaining calculation helper
        const [timeTrigger, setTimeTrigger] = useState(0);
        useEffect(() => {
          const timer = setInterval(() => {
            setTimeTrigger(prev => prev + 1);
          }, 60000); // refresh time relative strings every 1m
          return () => clearInterval(timer);
        }, []);

        // Filter and Search logic
        const filteredTasks = useMemo(() => {
          return tasks.filter(t => {
            const matchesProject = selectedFilterProjectId === 'all' || t.projectId === selectedFilterProjectId;
            
            let matchesStatus = true;
            const isOverdue = !t.isCompleted && new Date(t.planEndTime).getTime() < Date.now();
            
            if (statusFilter === 'completed') {
              matchesStatus = t.isCompleted;
            } else if (statusFilter === 'active') {
              matchesStatus = !t.isCompleted && !isOverdue;
            } else if (statusFilter === 'overdue') {
              matchesStatus = isOverdue;
            }

            const matchesKeyword = t.content.toLowerCase().includes(searchQuery.toLowerCase());

            return matchesProject && matchesStatus && matchesKeyword;
          });
        }, [tasks, selectedFilterProjectId, statusFilter, searchQuery, timeTrigger]);

        return (
          <div className="flex flex-col min-h-screen">
            {/* Header section */}
            <header className="bg-white dark:bg-slate-900 border-b border-gray-150 dark:border-slate-800 sticky top-0 z-40 shadow-sm transition-all duration-200">
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div className="flex items-center justify-between h-16 sm:h-20">
                  <div className="flex items-center gap-3">
                    <div className="p-2.5 bg-indigo-600 text-white rounded-2xl shadow-md shadow-indigo-500/10">
                      <Icon name="Briefcase" className="w-5 h-5 sm:w-6 sm:h-6" />
                    </div>
                    <div>
                      <h1 className="text-sm sm:text-base font-bold text-gray-900 dark:text-white font-display tracking-tight leading-none">
                        QUẢN LÝ TIẾN ĐỘ & HIỆU SUẤT KPI
                      </h1>
                      <p className="text-[10px] sm:text-xs text-gray-500 dark:text-slate-400 mt-1 sm:mt-1.5 hidden sm:block font-medium">
                        Hệ thống tự động theo dõi tiến độ thầu thầu, cảnh báo trễ hạn & nghiệm thu chất lượng
                      </p>
                      <p className="text-[9px] text-indigo-600 dark:text-indigo-400 sm:hidden mt-0.5 font-bold">
                        Hệ thống quản trị tiến độ thầu
                      </p>
                    </div>
                  </div>

                  <div className="flex items-center gap-2.5">
                    {/* Theme switcher */}
                    <button
                      type="button"
                      id="theme-toggle-btn"
                      onClick={() => setIsDarkMode(!isDarkMode)}
                      className="p-2.5 bg-slate-50 dark:bg-slate-800 text-gray-500 dark:text-slate-350 hover:bg-slate-100 dark:hover:bg-slate-750 rounded-xl transition duration-150 border border-gray-100 dark:border-slate-800"
                      title={isDarkMode ? 'Chuyển sang Giao diện Sáng' : 'Chuyển sang Giao diện Tối'}
                    >
                      <Icon name={isDarkMode ? 'Sun' : 'Moon'} className="w-4 h-4" />
                    </button>
                  </div>
                </div>
              </div>
            </header>

            {/* Navigation tabs */}
            <div className="bg-white dark:bg-slate-900 border-b border-gray-100 dark:border-slate-850/60 shadow-xs">
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div className="flex gap-2 sm:gap-4 py-3">
                  <button
                    type="button"
                    id="tab-btn-dashboard"
                    onClick={() => setCurrentTab('dashboard')}
                    className={`flex items-center gap-2 px-4 py-2.5 rounded-xl text-xs font-bold transition duration-150 ${
                      currentTab === 'dashboard'
                        ? 'bg-indigo-600 text-white shadow-sm shadow-indigo-600/10'
                        : 'text-gray-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800'
                    }`}
                  >
                    <Icon name="TrendingUp" className="w-4 h-4" />
                    <span>Dashboard Hiệu Suất KPI</span>
                  </button>

                  <button
                    type="button"
                    id="tab-btn-tasks"
                    onClick={() => setCurrentTab('tasks')}
                    className={`flex items-center gap-2 px-4 py-2.5 rounded-xl text-xs font-bold transition duration-150 ${
                      currentTab === 'tasks'
                        ? 'bg-indigo-600 text-white shadow-sm shadow-indigo-600/10'
                        : 'text-gray-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800'
                    }`}
                  >
                    <Icon name="ClipboardList" className="w-4 h-4" />
                    <span>Sổ Nhật Ký Công Việc</span>
                    <span className="bg-indigo-50 dark:bg-indigo-950/60 text-indigo-600 dark:text-indigo-400 font-extrabold text-[10px] px-1.5 py-0.5 rounded-full border border-indigo-100/30 dark:border-indigo-900/10 ml-0.5">
                      {tasks.filter(t => !t.isCompleted).length}
                    </span>
                  </button>
                </div>
              </div>
            </div>

            {/* Main Application Content */}
            <main className="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8 w-full animate-fade-in">
              {currentTab === 'dashboard' ? (
                <Dashboard 
                  projects={projects} 
                  tasks={tasks} 
                  onResetData={handleResetData} 
                />
              ) : (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
                  
                  {/* Left Column: Form adding */}
                  <div className="lg:col-span-1">
                    <TaskForm 
                      projects={projects} 
                      onAddTask={handleAddTask} 
                      onAddProject={handleAddProject} 
                    />
                  </div>

                  {/* Right Column: Listing and Filters */}
                  <div className="lg:col-span-2 space-y-4">
                    {/* Filters bar */}
                    <div className="bg-white dark:bg-slate-900 p-5 rounded-2xl border border-gray-100 dark:border-slate-800 shadow-sm space-y-4 transition-all duration-200">
                      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 border-b border-gray-50 dark:border-slate-800 pb-3">
                        <div className="flex items-center gap-1.5 text-gray-700 dark:text-white">
                          <Icon name="Filter" className="w-4 h-4 text-indigo-550" />
                          <span className="font-bold text-sm">Bộ Lọc & Tìm Kiếm Công Việc</span>
                        </div>
                        <span className="text-[11px] font-bold text-gray-400 dark:text-slate-500 uppercase tracking-wider">
                          Kết quả: {filteredTasks.length} / {tasks.length} dòng
                        </span>
                      </div>

                      {/* Filter Controls Row 1: Project & Status */}
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <div>
                          <label className="block text-[10px] font-bold text-gray-400 dark:text-slate-500 uppercase tracking-wider mb-1">
                            Lọc theo Dự án
                          </label>
                          <select
                            id="filter-project-select"
                            className="w-full rounded-xl border border-gray-200 dark:border-slate-800 px-3 py-2 text-xs bg-slate-50 dark:bg-slate-950 text-gray-800 dark:text-slate-100 focus:outline-none focus:ring-1 focus:ring-indigo-500"
                            value={selectedFilterProjectId}
                            onChange={(e) => setSelectedFilterProjectId(e.target.value)}
                          >
                            <option value="all">-- Tất cả Dự án / Gói thầu --</option>
                            {projects.map((p) => (
                              <option key={p.id} value={p.id}>
                                {p.name}
                              </option>
                            ))}
                          </select>
                        </div>

                        <div>
                          <label className="block text-[10px] font-bold text-gray-400 dark:text-slate-500 uppercase tracking-wider mb-1">
                            Trạng thái công việc
                          </label>
                          <div className="flex gap-1 bg-slate-50 dark:bg-slate-950 p-1 rounded-xl border border-gray-150 dark:border-slate-850">
                            <button
                              type="button"
                              id="filter-status-all"
                              onClick={() => setStatusFilter('all')}
                              className={`flex-1 text-center py-1.5 rounded-lg text-xs font-bold transition duration-150 ${
                                statusFilter === 'all'
                                  ? 'bg-white dark:bg-slate-800 text-indigo-600 dark:text-indigo-400 shadow-xs'
                                  : 'text-gray-400 dark:text-slate-500 hover:text-gray-600'
                              }`}
                            >
                              Tất cả
                            </button>
                            <button
                              type="button"
                              id="filter-status-active"
                              onClick={() => setStatusFilter('active')}
                              className={`flex-1 text-center py-1.5 rounded-lg text-xs font-bold transition duration-150 ${
                                statusFilter === 'active'
                                  ? 'bg-white dark:bg-slate-800 text-indigo-600 dark:text-indigo-400 shadow-xs'
                                  : 'text-gray-400 dark:text-slate-500 hover:text-gray-600'
                              }`}
                            >
                              Đang chạy
                            </button>
                            <button
                              type="button"
                              id="filter-status-completed"
                              onClick={() => setStatusFilter('completed')}
                              className={`flex-1 text-center py-1.5 rounded-lg text-xs font-bold transition duration-150 ${
                                statusFilter === 'completed'
                                  ? 'bg-white dark:bg-slate-800 text-indigo-600 dark:text-indigo-400 shadow-xs'
                                  : 'text-gray-400 dark:text-slate-500 hover:text-gray-600'
                              }`}
                            >
                              Đã xong
                            </button>
                            <button
                              type="button"
                              id="filter-status-overdue"
                              onClick={() => setStatusFilter('overdue')}
                              className={`flex-1 text-center py-1.5 rounded-lg text-xs font-bold transition duration-150 ${
                                statusFilter === 'overdue'
                                  ? 'bg-white dark:bg-slate-850 text-rose-600 dark:text-rose-400 shadow-xs'
                                  : 'text-gray-400 dark:text-slate-500 hover:text-gray-600'
                              }`}
                            >
                              Trễ hạn
                            </button>
                          </div>
                        </div>
                      </div>

                      {/* Filter Controls Row 2: Search Input */}
                      <div>
                        <div className="relative">
                          <span className="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                            <Icon name="Search" className="w-4 h-4" />
                          </span>
                          <input
                            type="text"
                            id="search-input"
                            placeholder="Nhập nội dung công việc để tìm kiếm nhanh..."
                            className="w-full rounded-xl border border-gray-200 dark:border-slate-800 pl-9 pr-3 py-2 text-xs bg-slate-50 dark:bg-slate-950 text-gray-800 dark:text-slate-100 focus:outline-none focus:ring-1 focus:ring-indigo-500"
                            value={searchQuery}
                            onChange={(e) => setSearchQuery(e.target.value)}
                          />
                        </div>
                      </div>
                    </div>

                    {/* Task Cards List */}
                    <div className="space-y-3">
                      {filteredTasks.length === 0 ? (
                        <div className="bg-white dark:bg-slate-900 rounded-2xl border border-gray-100 dark:border-slate-800 p-8 text-center transition-all duration-200">
                          <div className="w-12 h-12 bg-gray-50 dark:bg-slate-850 text-gray-400 dark:text-slate-550 rounded-full flex items-center justify-center mx-auto mb-3">
                            <Icon name="ClipboardList" className="w-6 h-6" />
                          </div>
                          <h4 className="text-sm font-bold text-gray-700 dark:text-slate-350">Không tìm thấy công việc</h4>
                          <p className="text-xs text-gray-400 dark:text-slate-500 mt-1">
                            Hãy thử đổi bộ lọc dự án, trạng thái hoặc tạo thêm một công việc mới.
                          </p>
                        </div>
                      ) : (
                        filteredTasks.map((task) => {
                          const project = projects.find((p) => p.id === task.projectId);
                          const remaining = getRemainingTimeText(task.planEndTime);
                          const isOverdue = !task.isCompleted && remaining.isOverdue;

                          return (
                            <div 
                              key={task.id} 
                              className={`bg-white dark:bg-slate-900 rounded-2xl border p-5 shadow-xs transition-all duration-150 flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between ${
                                task.isCompleted
                                  ? 'border-gray-100 dark:border-slate-850 opacity-90'
                                  : isOverdue
                                    ? 'border-rose-250 dark:border-rose-950/50 bg-rose-50/10 dark:bg-rose-950/5'
                                    : 'border-gray-100 dark:border-slate-800/80 hover:border-indigo-200 dark:hover:border-indigo-950/45'
                              }`}
                            >
                              <div className="space-y-3 flex-1 min-w-0">
                                {/* Project badge name */}
                                <div className="flex flex-wrap items-center gap-2">
                                  <span className="inline-flex items-center gap-1 text-[10px] font-black text-indigo-600 dark:text-indigo-400 bg-indigo-50/70 dark:bg-indigo-950/40 px-2.5 py-0.5 rounded-lg border border-indigo-100/30 dark:border-indigo-900/10 truncate max-w-[280px] sm:max-w-md">
                                    <Icon name="Folder" className="w-3 h-3 shrink-0" />
                                    {project ? project.name : 'Dự án không xác định'}
                                  </span>
                                  
                                  {/* Overdue/On-time indicator status badge */}
                                  {task.isCompleted ? (
                                    <span className={`inline-flex items-center gap-1 text-[10px] font-bold px-2.5 py-0.5 rounded-lg ${
                                      task.evaluation === 'Dat'
                                        ? 'bg-emerald-50 dark:bg-emerald-950/30 text-emerald-600 dark:text-emerald-400 border border-emerald-100/50 dark:border-emerald-900/20'
                                        : 'bg-rose-50 dark:bg-rose-950/30 text-rose-600 dark:text-rose-450 border border-rose-100/50 dark:border-rose-950/20'
                                    }`}>
                                      <Icon name={task.evaluation === 'Dat' ? 'CheckCircle2' : 'AlertTriangle'} className="w-3 h-3" />
                                      {task.evaluation === 'Dat' ? 'Nghiệm thu: ĐẠT' : 'Nghiệm thu: CHƯA ĐẠT'}
                                    </span>
                                  ) : isOverdue ? (
                                    <span className="inline-flex items-center gap-1 text-[10px] font-bold bg-rose-100 dark:bg-rose-950/60 text-rose-600 dark:text-rose-400 px-2.5 py-0.5 rounded-lg border border-rose-200/50 dark:border-rose-900/30 animate-pulse">
                                      <Icon name="AlertTriangle" className="w-3 h-3" />
                                      TRỄ HẠN
                                    </span>
                                  ) : (
                                    <span className="inline-flex items-center gap-1 text-[10px] font-bold bg-sky-50 dark:bg-sky-950/40 text-sky-600 dark:text-sky-400 px-2.5 py-0.5 rounded-lg border border-sky-100/40 dark:border-sky-900/10">
                                      {remaining.text}
                                    </span>
                                  )}
                                </div>

                                {/* Main Task Description */}
                                <p className={`text-sm sm:text-base font-semibold leading-relaxed ${
                                  task.isCompleted 
                                    ? 'line-through text-slate-400 dark:text-slate-550 font-normal' 
                                    : 'text-slate-800 dark:text-slate-100'
                                }`}>
                                  {task.content}
                                </p>

                                {/* Date-time log timelines */}
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 text-xs font-medium text-slate-400 dark:text-slate-500 border-t border-slate-50 dark:border-slate-850/60 pt-3">
                                  <div className="space-y-0.5">
                                    <p className="text-[10px] font-bold uppercase tracking-wider text-slate-350 dark:text-slate-600">Bắt đầu thầu:</p>
                                    <p className="text-slate-650 dark:text-slate-400">{formatReadableDateTime(task.startTime)}</p>
                                  </div>
                                  <div className="space-y-0.5">
                                    <p className="text-[10px] font-bold uppercase tracking-wider text-slate-350 dark:text-slate-600">
                                      {task.isCompleted ? 'Nghiệm thu thực tế:' : 'Hạn hoàn thành kế hoạch:'}
                                    </p>
                                    <p className={task.isCompleted ? 'text-emerald-600 dark:text-emerald-450 font-semibold' : isOverdue ? 'text-rose-650 dark:text-rose-400 font-semibold' : 'text-slate-650 dark:text-slate-400'}>
                                      {task.isCompleted 
                                        ? formatReadableDateTime(task.completedAt) 
                                        : formatReadableDateTime(task.planEndTime)}
                                    </p>
                                  </div>
                                </div>

                                {/* Custom Remarks / Lessons learned description when completed */}
                                {task.isCompleted && task.remarks && (
                                  <div className="bg-slate-50/60 dark:bg-slate-950/30 p-3 rounded-xl border border-gray-100 dark:border-slate-850/60 text-xs italic">
                                    <span className="font-bold text-slate-450 dark:text-slate-500 block mb-1 uppercase tracking-wider text-[9px] not-italic">Nhận xét & Biện pháp:</span>
                                    <span className="text-slate-600 dark:text-slate-350">"{task.remarks}"</span>
                                  </div>
                                )}
                              </div>

                              {/* Actions container row */}
                              <div className="flex sm:flex-col items-center justify-end gap-2 shrink-0 border-t sm:border-t-0 border-slate-50 dark:border-slate-850 pt-3 sm:pt-0">
                                {!task.isCompleted && (
                                  <button
                                    type="button"
                                    id={`complete-btn-${task.id}`}
                                    onClick={() => handleCompleteClick(task)}
                                    className="flex-1 sm:flex-initial flex items-center justify-center gap-1 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-xl shadow-xs transition duration-150 cursor-pointer w-full active:translate-y-px"
                                  >
                                    <Icon name="CheckCircle2" className="w-4 h-4" />
                                    <span>Nghiệm thu KPI</span>
                                  </button>
                                )}
                                
                                <button
                                  type="button"
                                  id={`delete-btn-${task.id}`}
                                  onClick={() => handleDeleteTask(task.id)}
                                  className="p-2 text-rose-600 dark:text-rose-400 hover:bg-rose-50 dark:hover:bg-rose-950/20 rounded-xl transition duration-150 cursor-pointer"
                                  title="Xóa công việc này"
                                >
                                  <Icon name="Trash2" className="w-4 h-4" />
                                </button>
                              </div>
                            </div>
                          );
                        })
                      )}
                    </div>
                  </div>

                </div>
              )}
            </main>

            {/* Footer */}
            <footer className="bg-white dark:bg-slate-900 border-t border-gray-150 dark:border-slate-850 py-5 transition-all duration-200">
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-xs text-slate-450 dark:text-slate-500 font-medium">
                <p>© 2026 Quản Lý Hiệu Suất Đấu Thầu & KPI. Tối ưu hóa 100% chạy offline trực tiếp khi kích đúp chuột.</p>
                <p className="mt-1 font-semibold text-indigo-500">Thiết kế bởi Tổ chức Quản trị thầu thầu</p>
              </div>
            </footer>

            {/* KPI Evaluation Overlay modal popup */}
            <TaskEvaluationModal
              isOpen={!!evaluatingTask}
              taskContent={evaluatingTask ? evaluatingTask.content : ''}
              onClose={() => setEvaluatingTask(null)}
              onSubmit={handleEvaluationSubmit}
            />
          </div>
        );
      }

      // Root render initializer
      const container = document.getElementById('root');
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    </script>
  </body>
</html>
